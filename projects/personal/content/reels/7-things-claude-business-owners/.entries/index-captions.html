<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>7 Things — Captions Only</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden;
        background: transparent;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1080px; height: 1920px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="56.46"
      data-width="1080"
      data-height="1920"
    >
      <div class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0" data-duration="56.46" data-track-index="20"
        data-width="1080" data-height="1920"></div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        tl.to({}, { duration: 56.46 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
