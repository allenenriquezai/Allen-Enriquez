<template id="scene2-app-template">
  <div
    data-composition-id="scene2-app"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="4.96"
  >
    <div class="wrap">
      <div class="num-mono">
        <span class="layer l-base">02</span>
        <span class="layer l-magenta">02</span>
        <span class="layer l-blue">02</span>
      </div>

      <div class="headline">BUILDS A<br/>WORKING APP</div>
      <div class="underline-sweep"></div>

      <div class="prompt-to-app">
        <div class="prompt-box">
          <div class="prompt-chrome">PROMPT</div>
          <div class="prompt-text" id="prompt-text"></div>
          <div class="prompt-cursor">▋</div>
        </div>
        <div class="arrow-down">↓</div>
        <div class="phone-mock">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="ps-title">MY APP</div>
            <div class="ps-row"></div>
            <div class="ps-row"></div>
            <div class="ps-cta">TAP</div>
          </div>
        </div>
      </div>

      <div class="subtext">PLAIN ENGLISH &nbsp;→&nbsp; APP OUT</div>
    </div>

    <style>
      [data-composition-id="scene2-app"] { position: absolute; inset: 0; background: #05080F; overflow: hidden; }
      [data-composition-id="scene2-app"] .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; padding: 80px 60px;
      }
      [data-composition-id="scene2-app"] .num-mono { position: relative; width: 300px; height: 280px; }
      [data-composition-id="scene2-app"] .num-mono .layer {
        position: absolute; inset: 0;
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 280px; line-height: 0.85; letter-spacing: -0.04em;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene2-app"] .num-mono .l-base    { color: #fff; text-shadow: 0 0 40px rgba(2,179,233,0.7); }
      [data-composition-id="scene2-app"] .num-mono .l-magenta { color: #ff00a8; mix-blend-mode: screen; opacity: 0.85; }
      [data-composition-id="scene2-app"] .num-mono .l-blue    { color: #02B3E9; mix-blend-mode: screen; opacity: 0.85; }

      [data-composition-id="scene2-app"] .headline {
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 96px; line-height: 0.95; color: #fff; text-align: center;
        letter-spacing: -0.02em;
        text-shadow: 0 0 30px rgba(2,179,233,0.35);
      }
      [data-composition-id="scene2-app"] .underline-sweep {
        width: 0; height: 8px;
        background: linear-gradient(90deg, #02B3E9, #7de9ff);
        box-shadow: 0 0 18px rgba(2,179,233,0.9);
        border-radius: 4px;
      }

      [data-composition-id="scene2-app"] .prompt-to-app {
        display: flex; flex-direction: column; align-items: center; gap: 14px;
        margin-top: 10px;
      }
      [data-composition-id="scene2-app"] .prompt-box {
        width: 680px;
        border-radius: 16px;
        background: rgba(5,10,18,0.9);
        border: 1px solid rgba(2,179,233,0.45);
        padding: 18px 22px;
        display: flex; flex-direction: column; gap: 6px;
      }
      [data-composition-id="scene2-app"] .prompt-chrome {
        font-family: 'Roboto Mono', monospace; font-size: 18px;
        color: #02B3E9; letter-spacing: 0.26em;
      }
      [data-composition-id="scene2-app"] .prompt-text {
        font-family: 'Roboto Mono', monospace; font-size: 30px;
        color: #fff; min-height: 42px;
      }
      [data-composition-id="scene2-app"] .pch { display: inline-block; opacity: 0; white-space: pre; }
      [data-composition-id="scene2-app"] .prompt-cursor { color: #02B3E9; font-size: 28px; margin-top: -28px; align-self: flex-start; }
      [data-composition-id="scene2-app"] .arrow-down {
        font-size: 52px; color: #02B3E9;
        text-shadow: 0 0 16px rgba(2,179,233,0.8);
        font-weight: 900;
      }
      [data-composition-id="scene2-app"] .phone-mock {
        width: 260px; height: 500px;
        border-radius: 42px;
        background: rgba(5,10,18,0.95);
        border: 3px solid rgba(2,179,233,0.6);
        box-shadow: 0 0 40px rgba(2,179,233,0.35);
        position: relative; padding: 24px 18px;
      }
      [data-composition-id="scene2-app"] .phone-notch {
        position: absolute; top: 10px; left: 50%;
        transform: translateX(-50%);
        width: 90px; height: 18px;
        background: #000; border-radius: 10px;
      }
      [data-composition-id="scene2-app"] .phone-screen {
        margin-top: 18px;
        display: flex; flex-direction: column; gap: 14px;
      }
      [data-composition-id="scene2-app"] .ps-title {
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 28px; color: #fff; text-align: center;
        letter-spacing: 0.08em;
      }
      [data-composition-id="scene2-app"] .ps-row {
        height: 40px; border-radius: 10px;
        background: rgba(2,179,233,0.18);
        border: 1px solid rgba(2,179,233,0.35);
      }
      [data-composition-id="scene2-app"] .ps-cta {
        margin-top: 14px; padding: 14px 0;
        text-align: center;
        background: #02B3E9; color: #05080F;
        border-radius: 12px;
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 26px; letter-spacing: 0.14em;
        box-shadow: 0 0 20px rgba(2,179,233,0.8);
      }
      [data-composition-id="scene2-app"] .subtext {
        font-family: 'Roboto Mono', monospace; font-weight: 500;
        font-size: 30px; letter-spacing: 0.22em;
        color: rgba(255,255,255,0.85);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene2-app"]';
        const SLOT = 4.96;

        const prompt = '"build me a booking app"';
        const pEl = document.querySelector(sel + ' #prompt-text');
        if (pEl) {
          pEl.innerHTML = '';
          for (const ch of prompt) {
            const s = document.createElement('span');
            s.className = 'pch'; s.textContent = ch;
            pEl.appendChild(s);
          }
        }

        const tl = gsap.timeline({ paused: true });

        // Numeral slam
        tl.from(sel + ' .num-mono', { scale: 0.25, opacity: 0, rotate: 6, duration: 0.38, ease: 'back.out(2.6)' }, 0.10);
        tl.fromTo(sel + ' .num-mono .l-magenta', { x: -44, y: -22 }, { x: -7, y: -3, duration: 0.50, ease: 'expo.out' }, 0.10);
        tl.fromTo(sel + ' .num-mono .l-blue',    { x: 44,  y: 22  }, { x: 7,  y: 3,  duration: 0.50, ease: 'expo.out' }, 0.10);

        tl.from(sel + ' .headline', { y: 60, opacity: 0, duration: 0.42, ease: 'power3.out' }, 0.30);
        tl.to(sel + ' .underline-sweep', { width: 460, duration: 0.40, ease: 'power2.out' }, 0.70);

        // Prompt types in
        tl.from(sel + ' .prompt-box', { y: 30, opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.95);
        tl.to(sel + ' .pch', { opacity: 1, duration: 0.02, stagger: 0.035, ease: 'none' }, 1.25);

        // Arrow pops + phone slams
        tl.from(sel + ' .arrow-down', { y: -20, opacity: 0, scale: 0.4, duration: 0.28, ease: 'back.out(2.5)' }, 2.20);
        tl.to(sel + ' .arrow-down', { y: 8, duration: 0.4, yoyo: true, repeat: 6, ease: 'sine.inOut' }, 2.50);

        tl.fromTo(sel + ' .phone-mock',
          { scale: 0.3, opacity: 0, rotate: -8 },
          { scale: 1, opacity: 1, rotate: 0, duration: 0.40, ease: 'back.out(2)' }, 2.55);
        tl.from(sel + ' .ps-row', { scaleX: 0, opacity: 0, stagger: 0.12, duration: 0.3, ease: 'power2.out' }, 2.95);
        tl.from(sel + ' .ps-cta', { scale: 0, opacity: 0, duration: 0.35, ease: 'back.out(2.5)' }, 3.35);
        tl.to(sel + ' .ps-cta', { scale: 1.08, duration: 0.3, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 3.70);

        tl.from(sel + ' .subtext', { y: 20, opacity: 0, duration: 0.35, ease: 'power2.out' }, 3.90);

        // Ambient glow
        tl.to(sel + ' .num-mono .l-base', { textShadow: '0 0 60px rgba(2,179,233,1)', duration: 0.7, yoyo: true, repeat: 2, ease: 'sine.inOut' }, 1.40);

        tl.to(sel + ' .wrap', { y: -50, opacity: 0, duration: 0.30, ease: 'power2.in' }, SLOT - 0.35);
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-app"] = tl;
      })();
    </script>
  </div>
</template>
