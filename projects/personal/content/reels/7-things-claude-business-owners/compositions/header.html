<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden;
        background: transparent;
        font-family: "Montserrat", sans-serif;
      }
      .header-pill {
        position: absolute;
        top: 300px;
        left: 50%;
        transform: translateX(-50%);
        background: #05080F;
        border: 3px solid #02B3E9;
        border-radius: 60px;
        padding: 22px 52px;
        width: 960px;
        text-align: center;
        box-shadow:
          0 0 18px 4px rgba(2,179,233,0.55),
          0 0 40px 10px rgba(2,179,233,0.25),
          inset 0 0 14px 0 rgba(2,179,233,0.08);
        white-space: nowrap;
      }
      .header-text {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 46px;
        letter-spacing: 0.04em;
        color: #ffffff;
        text-transform: uppercase;
        text-shadow:
          0 0 12px rgba(2,179,233,0.6),
          2px 2px 0 rgba(0,0,0,0.8);
        line-height: 1.15;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <div class="header-pill">
      <div class="header-text">7 Things Claude Does<br>For Business Owners &amp; Pros</div>
    </div>
  </body>
</html>
