<template id="scene1-website-template">
  <div
    data-composition-id="scene1-website"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="5.48"
  >
    <div class="wrap">
      <div class="numeral-block">
        <div class="num-mono">
          <span class="layer l-base">01</span>
          <span class="layer l-magenta">01</span>
          <span class="layer l-blue">01</span>
        </div>
      </div>

      <div class="label-block">
        <div class="headline">BUILDS A FULL<br/>WEBSITE</div>
        <div class="underline-sweep"></div>
        <div class="subtext">ONE PROMPT &nbsp;·&nbsp; USED TO COST $10K</div>
      </div>

      <div class="mock-browser">
        <div class="browser-chrome">
          <span class="bc-dot r"></span><span class="bc-dot y"></span><span class="bc-dot g"></span>
          <span class="bc-url">yoursite.com</span>
        </div>
        <div class="browser-body">
          <div class="bb-hero"></div>
          <div class="bb-row r1"></div>
          <div class="bb-row r2"></div>
          <div class="bb-row r3"></div>
        </div>
      </div>

      <div class="price-stamp">
        <span class="strike">$10,000</span>
        <span class="arrow">→</span>
        <span class="now">$0</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-website"] { position: absolute; inset: 0; background: #05080F; overflow: hidden; }
      [data-composition-id="scene1-website"] .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 28px; padding: 80px 60px;
      }
      [data-composition-id="scene1-website"] .numeral-block { position: relative; }
      [data-composition-id="scene1-website"] .num-mono {
        position: relative; width: 300px; height: 280px;
      }
      [data-composition-id="scene1-website"] .num-mono .layer {
        position: absolute; inset: 0;
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 280px; line-height: 0.85; letter-spacing: -0.04em;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene1-website"] .num-mono .l-base    { color: #ffffff; text-shadow: 0 0 40px rgba(2,179,233,0.7); }
      [data-composition-id="scene1-website"] .num-mono .l-magenta { color: #ff00a8; mix-blend-mode: screen; opacity: 0.85; }
      [data-composition-id="scene1-website"] .num-mono .l-blue    { color: #02B3E9; mix-blend-mode: screen; opacity: 0.85; }

      [data-composition-id="scene1-website"] .label-block { text-align: center; position: relative; }
      [data-composition-id="scene1-website"] .headline {
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 96px; line-height: 0.95; color: #fff;
        letter-spacing: -0.02em;
        text-shadow: 0 0 30px rgba(2,179,233,0.35);
      }
      [data-composition-id="scene1-website"] .underline-sweep {
        margin: 14px auto 16px;
        width: 0; height: 8px;
        background: linear-gradient(90deg, #02B3E9, #7de9ff);
        box-shadow: 0 0 18px rgba(2,179,233,0.9);
        border-radius: 4px;
      }
      [data-composition-id="scene1-website"] .subtext {
        font-family: 'Roboto Mono', monospace; font-weight: 500;
        font-size: 32px; letter-spacing: 0.22em;
        color: rgba(255,255,255,0.85);
      }

      [data-composition-id="scene1-website"] .mock-browser {
        width: 820px; margin-top: 20px;
        border-radius: 20px; overflow: hidden;
        background: rgba(5, 10, 18, 0.95);
        border: 1px solid rgba(2,179,233,0.45);
        box-shadow: 0 0 40px rgba(2,179,233,0.25);
      }
      [data-composition-id="scene1-website"] .browser-chrome {
        display: flex; align-items: center; gap: 10px;
        padding: 16px 22px;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      [data-composition-id="scene1-website"] .bc-dot {
        width: 14px; height: 14px; border-radius: 50%;
      }
      [data-composition-id="scene1-website"] .bc-dot.r { background: #ff4757; }
      [data-composition-id="scene1-website"] .bc-dot.y { background: #feca57; }
      [data-composition-id="scene1-website"] .bc-dot.g { background: #22c55e; }
      [data-composition-id="scene1-website"] .bc-url {
        margin-left: 14px; font-family: 'Roboto Mono', monospace;
        font-size: 22px; color: rgba(255,255,255,0.6); letter-spacing: 0.1em;
      }
      [data-composition-id="scene1-website"] .browser-body {
        padding: 22px; display: flex; flex-direction: column; gap: 14px;
        min-height: 280px;
      }
      [data-composition-id="scene1-website"] .bb-hero {
        height: 120px; border-radius: 12px;
        background: linear-gradient(135deg, rgba(2,179,233,0.35), rgba(125,233,255,0.08));
        border: 1px solid rgba(2,179,233,0.35);
        transform-origin: left center;
      }
      [data-composition-id="scene1-website"] .bb-row {
        height: 30px; border-radius: 8px;
        background: rgba(255,255,255,0.08);
        transform-origin: left center;
      }
      [data-composition-id="scene1-website"] .bb-row.r1 { width: 88%; }
      [data-composition-id="scene1-website"] .bb-row.r2 { width: 72%; }
      [data-composition-id="scene1-website"] .bb-row.r3 { width: 60%; }

      [data-composition-id="scene1-website"] .price-stamp {
        display: inline-flex; align-items: baseline; gap: 18px;
        padding: 18px 32px;
        border: 2px solid rgba(2,179,233,0.7);
        border-radius: 14px;
        background: rgba(2,179,233,0.10);
        box-shadow: 0 0 26px rgba(2,179,233,0.35);
        font-family: 'Montserrat', sans-serif; font-weight: 900;
      }
      [data-composition-id="scene1-website"] .price-stamp .strike {
        color: rgba(255,255,255,0.55);
        font-size: 42px;
        text-decoration: line-through;
        text-decoration-color: #ff4757;
        text-decoration-thickness: 4px;
      }
      [data-composition-id="scene1-website"] .price-stamp .arrow {
        color: rgba(255,255,255,0.7); font-size: 40px;
      }
      [data-composition-id="scene1-website"] .price-stamp .now {
        color: #02B3E9;
        font-size: 72px;
        letter-spacing: -0.02em;
        text-shadow: 0 0 24px rgba(2,179,233,0.9);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene1-website"]';
        const SLOT = 5.48;
        const tl = gsap.timeline({ paused: true });

        // Numeral chromatic slam
        tl.from(sel + ' .num-mono', { scale: 0.25, opacity: 0, rotate: -8, duration: 0.38, ease: 'back.out(2.6)' }, 0.10);
        tl.fromTo(sel + ' .num-mono .l-magenta', { x: -44, y: -22 }, { x: -7, y: -3, duration: 0.50, ease: 'expo.out' }, 0.10);
        tl.fromTo(sel + ' .num-mono .l-blue',    { x: 44,  y: 22  }, { x: 7,  y: 3,  duration: 0.50, ease: 'expo.out' }, 0.10);

        // Headline pop
        tl.from(sel + ' .headline', { y: 60, opacity: 0, duration: 0.42, ease: 'power3.out' }, 0.30);

        // Underline sweep
        tl.to(sel + ' .underline-sweep', { width: 480, duration: 0.45, ease: 'power2.out' }, 0.70);

        // Subtext slide
        tl.from(sel + ' .subtext', { y: 20, opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.85);

        // Browser mock pops in
        tl.from(sel + ' .mock-browser', { y: 60, opacity: 0, scale: 0.96, duration: 0.45, ease: 'power3.out' }, 1.10);

        // Browser contents build
        tl.from(sel + ' .bb-hero', { scaleX: 0, opacity: 0, duration: 0.40, ease: 'power2.out' }, 1.55);
        tl.from(sel + ' .bb-row',  { scaleX: 0, opacity: 0, duration: 0.30, stagger: 0.10, ease: 'power2.out' }, 1.90);

        // Price stamp slam (payoff — after browser visible + held)
        tl.fromTo(sel + ' .price-stamp',
          { scale: 2.2, opacity: 0, rotate: -5 },
          { scale: 1, opacity: 1, rotate: 0, duration: 0.30, ease: 'power3.out' }, 3.20);
        tl.to(sel + ' .price-stamp', { scale: 1.05, duration: 0.25, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 3.55);

        // Ambient glow oscillation on numeral
        tl.to(sel + ' .num-mono .l-base', { textShadow: '0 0 60px rgba(2,179,233,1)', duration: 0.8, yoyo: true, repeat: 2, ease: 'sine.inOut' }, 1.50);

        // Exit
        tl.to(sel + ' .wrap', { y: -50, opacity: 0, duration: 0.30, ease: 'power2.in' }, SLOT - 0.35);

        tl.to({}, { duration: SLOT }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-website"] = tl;
      })();
    </script>
  </div>
</template>
