<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>7 Things Claude Does — Full Reel</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden;
        background: #05080F;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1080px; height: 1920px;
      }
      #face-video {
        position: absolute;
        top: 0; left: 0;
        width: 1080px; height: 1920px;
        object-fit: cover;
        object-position: center center;
        transform-origin: center center;
        filter: contrast(1.06) saturate(1.06) brightness(0.98);
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="56.46"
      data-width="1080"
      data-height="1920"
    >
      <!-- Full reel: face 0-56.46s, scenes overlay 6.70-54.22, captions full width -->

      <video
        id="face-video"
        data-start="0"
        data-duration="56.46"
        data-clip-type="video"
        src="assets/source.mov"
        preload="auto"
        muted
        playsinline
      ></video>

      <audio
        id="face-audio"
        data-start="0"
        data-duration="56.46"
        data-clip-type="audio"
        data-volume="1"
        src="assets/source.mov"
      ></audio>

      <!-- Scenes — shifted to global start 6.70s. Alternating track indices. -->
      <div class="scene-layer"
        data-composition-id="scene1-website"
        data-composition-src="compositions/scene1-website.html"
        data-start="6.70" data-duration="5.48" data-track-index="5"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene2-app"
        data-composition-src="compositions/scene2-app.html"
        data-start="12.18" data-duration="4.96" data-track-index="6"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene3-content"
        data-composition-src="compositions/scene3-content.html"
        data-start="17.14" data-duration="5.16" data-track-index="5"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene4-spy"
        data-composition-src="compositions/scene4-spy.html"
        data-start="22.30" data-duration="6.48" data-track-index="6"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene5-hire"
        data-composition-src="compositions/scene5-hire.html"
        data-start="28.78" data-duration="5.52" data-track-index="5"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene6-leads"
        data-composition-src="compositions/scene6-leads.html"
        data-start="34.30" data-duration="6.52" data-track-index="6"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene7-crm"
        data-composition-src="compositions/scene7-crm.html"
        data-start="40.82" data-duration="5.36" data-track-index="5"
        data-width="1080" data-height="1920"></div>

      <div class="scene-layer"
        data-composition-id="scene8-summary"
        data-composition-src="compositions/scene8-summary.html"
        data-start="46.18" data-duration="8.04" data-track-index="6"
        data-width="1080" data-height="1920"></div>

      <!-- Karaoke captions — full duration, top layer. -->
      <div class="scene-layer"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0" data-duration="56.46" data-track-index="20"
        data-width="1080" data-height="1920"></div>
    </div>

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        tl.to("#face-video", { scale: 1.025, duration: 56.46, ease: "none" }, 0);
        tl.to({}, { duration: 56.46 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
