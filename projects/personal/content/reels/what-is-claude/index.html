<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>What Is Claude</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #05080F;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      .scene-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1080px;
        height: 1920px;
      }
      #face-video {
        position: absolute;
        top: 0; left: 0;
        width: 1080px;
        height: 1920px;
        object-fit: cover;
        object-position: center center;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="79.96"
      data-width="1080"
      data-height="1920"
    >
      <!-- Face video (full-frame cover) -->
      <video
        id="face-video"
        data-start="0"
        data-duration="79.96"
        data-clip-type="video"
        src="assets/source.mov"
        preload="auto"
        muted
        playsinline
      ></video>

      <!-- Audio -->
      <audio
        id="face-audio"
        data-start="0"
        data-duration="79.96"
        data-clip-type="audio"

      <!-- Header sticker — hook window (0 → 7.96s) -->
      <div class="scene-layer"
        data-composition-id="header-sticker"

        data-start="0" data-duration="7.96" data-track-index="8"

        tl.to({}, { duration: 79.96 }, 0);
