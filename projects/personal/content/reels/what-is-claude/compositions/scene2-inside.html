<template id="scene2-inside-template">
  <div
    data-composition-id="scene2-inside"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="1.50"
  >
    <div class="overlay">
      <div class="question-text" id="q-text">WHAT'S INSIDE?</div>
    </div>

    <style>
      [data-composition-id="scene2-inside"] {
        position: absolute; inset: 0;
        pointer-events: none;
      }
      [data-composition-id="scene2-inside"] .overlay {
        position: absolute;
        top: 420px; left: 0; right: 0;
        height: 1080px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0; visibility: hidden;
      }
      [data-composition-id="scene2-inside"] .question-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 112px;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        text-align: center;
        text-shadow:
          -4px -4px 0 #000, 4px -4px 0 #000,
          -4px 4px 0 #000, 4px 4px 0 #000,
          0 0 50px rgba(2,179,233,1.0),
          0 0 100px rgba(2,179,233,0.6);
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
    (function () {
      const SLOT = 1.50;
      const sel = '[data-composition-id="scene2-inside"]';
      const tl = gsap.timeline({ paused: true });

      tl.set(sel + ' .overlay', { autoAlpha: 1 }, 0);

      tl.fromTo('#q-text',
        { scale: 0.35, opacity: 0 },
        { scale: 1.10, opacity: 1, duration: 0.24, ease: 'back.out(3)' }, 0.05);
      tl.to('#q-text', { scale: 1.0, duration: 0.16, ease: 'power2.out' }, 0.29);
      tl.to('#q-text', { scale: 1.04, duration: 0.28, yoyo: true, repeat: 2, ease: 'sine.inOut' }, 0.50);

      tl.set(sel + ' .overlay', { autoAlpha: 0 }, SLOT);
      tl.to({}, { duration: SLOT }, 0);
      window.__timelines = window.__timelines || {};
      window.__timelines['scene2-inside'] = tl;
    })();
    </script>
  </div>
</template>
