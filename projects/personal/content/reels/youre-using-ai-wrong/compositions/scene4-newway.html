    <style>
      [data-composition-id="scene4-newway"] { position: absolute; inset: 0; }
      [data-composition-id="scene4-newway"] .wrap {

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene4-newway"]';

        // Pre-build typewriter char spans (no onUpdate — pure stagger)
        const cmd = 'follow up with my 10 leads today';
        const termEl = document.querySelector(sel + ' #term-text');
        if (termEl) {
          termEl.innerHTML = '';
          for (const ch of cmd) {
            const s = document.createElement('span');
            s.className = 'tch';
            s.textContent = ch;
            termEl.appendChild(s);
          }
        }

        const tl = gsap.timeline({ paused: true });

        tl.from(sel + ' .wrap', { y: 150, scale: 0.92, opacity: 0, duration: 0.55, ease: 'power3.out' }, 0);
        tl.from(sel + ' .banner', { scale: 0.7, opacity: 0, duration: 0.4, ease: 'back.out(2.2)' }, 0.15);
        tl.from(sel + ' .terminal', { y: 40, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.3);

        // Typewriter: per-char opacity stagger (fast-mode safe)
        const CHAR_DUR = 0.02;
        const CHAR_STEP = 0.05;  // 20 chars/sec
        tl.to(sel + ' .tch', {
          opacity: 1,
          duration: CHAR_DUR,
          ease: 'none',
          stagger: CHAR_STEP
        }, 0.7);

        // Cursor blink — visibility toggles via set (discrete, fast)
        for (let i = 0; i < 8; i++) {
          tl.set(sel + ' .cursor', { opacity: 0 }, 0.5 + i * 0.8);
          tl.set(sel + ' .cursor', { opacity: 1 }, 0.5 + i * 0.8 + 0.4);
        }

        // Pipeline nodes light up
        tl.from(sel + ' .n1', { scale: 0.85, opacity: 0, duration: 0.3, ease: 'back.out(2)' }, 2.6);
        tl.from(sel + ' .a1', { opacity: 0, scale: 0, duration: 0.2, ease: 'power3.out' }, 2.9);
        tl.from(sel + ' .n2', { scale: 0.85, opacity: 0, duration: 0.3, ease: 'back.out(2)' }, 3.1);

        // Agent node glow pulse — opacity on sibling glow div (fast-mode safe)
        tl.to(sel + ' .n2 .node-glow', { opacity: 1, duration: 0.5, yoyo: true, repeat: 3, ease: 'sine.inOut' }, 3.5);

        tl.from(sel + ' .a2', { opacity: 0, scale: 0, duration: 0.2, ease: 'power3.out' }, 3.4);
        tl.from(sel + ' .n3', { scale: 0.85, opacity: 0, duration: 0.3, ease: 'back.out(2)' }, 3.6);

        // Sent pills stagger in
        tl.from(sel + ' .sent-pill', {
          y: 20, opacity: 0, scale: 0.9,
          duration: 0.35, ease: 'back.out(2)',
          stagger: 0.13
        }, 5.2);

        // Exit
        tl.to(sel + ' .wrap', { y: -150, scale: 0.92, opacity: 0, duration: 0.33, ease: 'power2.in' }, 8.96);
        tl.to({}, { duration: 9.29 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-newway"] = tl;
      })();
    </script>
  </div>
</template>
