    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene7-start"]';

        // Pre-build typewriter char spans for the Claude input demo
        const cmd = 'follow up with my leads';
        const demoEl = document.querySelector(sel + ' #demo-text');
        if (demoEl) {
          demoEl.innerHTML = '';
          for (const ch of cmd) {
            const s = document.createElement('span');
            s.className = 'ich';
            s.textContent = ch;
            demoEl.appendChild(s);
          }
        }

        const tl = gsap.timeline({ paused: true });

        tl.from(sel + ' .wrap', { y: 150, scale: 0.92, opacity: 0, duration: 0.55, ease: 'power3.out' }, 0);
        tl.from(sel + ' .banner', { scale: 0.75, opacity: 0, duration: 0.45, ease: 'back.out(2.2)' }, 0.2);

        // Step 1 text appears
        tl.from(sel + ' .s1', { x: -150, opacity: 0, duration: 0.45, ease: 'power3.out' }, 1.3);
        tl.from(sel + ' .s1 .app', { y: 20, opacity: 0, scale: 0.8, duration: 0.25, ease: 'back.out(2)', stagger: 0.10 }, 1.7);

        // Claude app demo animation sequence (2.2s-4.4s)
        // 1. Window slides up
        tl.to(sel + ' #app-demo', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 2.2);
        tl.from(sel + ' .app-window', { y: 60, scale: 0.9, opacity: 0, duration: 0.5, ease: 'back.out(1.8)' }, 2.2);

        // 2. Cursor appears + clicks (x,y — supported; removed top/left)
        tl.to(sel + ' #cursor', { opacity: 1, duration: 0.15 }, 2.6);
        tl.to(sel + ' #cursor', { x: 100, y: 120, duration: 0.4, ease: 'power2.inOut' }, 2.6);
        tl.to(sel + ' #cursor', { scale: 0.82, duration: 0.08, ease: 'power2.in' }, 3.0);
        tl.to(sel + ' #cursor', { scale: 1, duration: 0.2, ease: 'back.out(3)' }, 3.08);

        // 3. Greeting fades
        tl.to(sel + ' #ghost-greet', { opacity: 0, y: -10, duration: 0.25, ease: 'power2.in' }, 3.0);

        // 4. Typewriter: per-char opacity stagger (fast-mode safe)
        const CHAR_DUR = 0.02;
        const CHAR_STEP = 0.05;
        tl.to(sel + ' .ich', { opacity: 1, duration: CHAR_DUR, ease: 'none', stagger: CHAR_STEP }, 3.15);

        // 5. Input row glow — opacity on sibling .input-glow (fast-mode safe)
        tl.to(sel + ' .input-glow', { opacity: 1, duration: 0.3, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 4.35);

        // 6. Cursor fades
        tl.to(sel + ' #cursor', { opacity: 0, duration: 0.2 }, 4.5);

        // Blinker — discrete toggles instead of tween with steps easing
        for (let i = 0; i < 5; i++) {
          tl.set(sel + ' .blinker', { opacity: 0 }, 2.5 + i * 0.8);
          tl.set(sel + ' .blinker', { opacity: 1 }, 2.5 + i * 0.8 + 0.4);
        }

        // App demo exit when step 2 activates
        tl.to(sel + ' #app-demo', {
          opacity: 0, y: -40, scale: 0.94,
          duration: 0.45, ease: 'power2.in'
        }, 4.6);

        // Step 2 activates: "Pick one task from your week" ~ 4.8-6.3s
        tl.from(sel + ' .s2', { x: -150, opacity: 0, duration: 0.45, ease: 'power3.out' }, 4.85);

        // Step 3 activates: "Tell it what to do" ~ 6.4-8.0s
        tl.from(sel + ' .s3', { x: -150, opacity: 0, duration: 0.45, ease: 'power3.out' }, 6.4);

        // Active step highlighting — opacity on .step-active-bg (fast-mode safe, no className)
        tl.to(sel + ' .s1 .step-active-bg', { opacity: 1, duration: 0.01 }, 1.3);
        tl.to(sel + ' .s1 .step-active-bg', { opacity: 0, duration: 0.01 }, 4.65);
        tl.to(sel + ' .s2 .step-active-bg', { opacity: 1, duration: 0.01 }, 4.85);
        tl.to(sel + ' .s2 .step-active-bg', { opacity: 0, duration: 0.01 }, 6.25);
        tl.to(sel + ' .s3 .step-active-bg', { opacity: 1, duration: 0.01 }, 6.4);

        tl.to({}, { duration: 13.36 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene7-start"] = tl;
      })();
    </script>
