    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene4-socrates"]';
        const SLOT = 6.42;

        // Build prompt body char-by-char
        const userText = ' How do I grow my business?';
        const uEl = document.querySelector(sel + ' #s4-user-text');
        if (uEl) {
          uEl.innerHTML = '';
          for (const ch of userText) {
            const s = document.createElement('span');
            s.className = 'pch';
            s.textContent = ch;
            uEl.appendChild(s);
          }
        }

        // Stream head char-by-char
        const headText = 'Let me ask you 3 questions...';
        const hEl = document.querySelector(sel + ' #s4-stream-head');
        if (hEl) {
          hEl.innerHTML = '';
          for (const ch of headText) {
            const s = document.createElement('span');
            s.className = 'hch';
            s.textContent = ch;
            hEl.appendChild(s);
          }
        }

        const tl = gsap.timeline({ paused: true });

        // t=0.10: chrome slides in
        tl.from(sel + ' .chrome', { y: -30, opacity: 0, duration: 0.3, ease: 'power3.out' }, 0.10);
        tl.from(sel + ' .corner-tag', { opacity: 0, duration: 0.2 }, 0.20);
        tl.to(sel + ' .corner-tag', { opacity: 1, duration: 0.2 }, 0.20);

        // t=0.30: user bubble pops
        tl.from(sel + ' .bubble.user', { scale: 0.92, y: 40, opacity: 0, duration: 0.35, ease: 'back.out(1.6)' }, 0.30);

        // t=0.45: code-word slam
        tl.fromTo(sel + ' .code-word',
          { scale: 0.6, opacity: 0 },
          { scale: 1.0, opacity: 1, duration: 0.30, ease: 'back.out(2.2)' }, 0.45);
        tl.to(sel + ' .code-word', { textShadow: '0 0 36px rgba(2,179,233,1)', duration: 0.25, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 0.75);

        // t=0.90: prompt body types (27 chars × 0.04 = 1.08s)
        tl.to(sel + ' .pch', { opacity: 1, duration: 0.02, stagger: 0.04, ease: 'none' }, 0.90);

        // Cursor blink
        for (let i = 0; i < 12; i++) {
          tl.set(sel + ' .prompt-cursor', { opacity: 0 }, 1.019 + i * 0.5095);
          tl.set(sel + ' .prompt-cursor', { opacity: 1 }, 1.019 + i * 0.5095 + 0.25475);
        }

        // t=2.038: bot bubble pops
        tl.from(sel + ' .bubble.bot', { scale: 0.95, y: 30, opacity: 0, duration: 0.3057, ease: 'power3.out' }, 2.038);

        // t=2.1399: stream-head types (29 chars × 0.028532 = 0.827s) — intro line
        tl.to(sel + ' .hch', { opacity: 1, duration: 0.02038, stagger: 0.028532, ease: 'none' }, 2.1399);

        // === Q1: 2.4456 → ~3.46 (in 0.3057, hold 0.45855, out 0.25475) ===
        tl.fromTo(sel + ' .q1',
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.3057, ease: 'back.out(1.4)' }, 2.4456);
        tl.fromTo(sel + ' .q1 .q-glyph',
          { scale: 1.0 },
          { scale: 1.3, duration: 0.18342, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 2.49655);
        tl.fromTo(sel + ' .s1',
          { opacity: 0, x: -8 },
          { opacity: 1, x: 0, duration: 0.25475, ease: 'power2.out' }, 2.49655);
        tl.to(sel + ' .q1', { opacity: 0, duration: 0.25475, ease: 'power2.in' }, 3.20985);
        tl.to(sel + ' .s1', { opacity: 0, duration: 0.2038, ease: 'power2.in' }, 3.2608);

        // === Q2: 3.51555 → ~4.59 (in 0.3057, hold 0.5095, out 0.25475) ===
        tl.fromTo(sel + ' .q2',
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.3057, ease: 'back.out(1.4)' }, 3.51555);
        tl.fromTo(sel + ' .q2 .q-glyph',
          { scale: 1.0 },
          { scale: 1.3, duration: 0.18342, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 3.5665);
        tl.fromTo(sel + ' .s2',
          { opacity: 0, x: -8 },
          { opacity: 1, x: 0, duration: 0.25475, ease: 'power2.out' }, 3.5665);
        tl.to(sel + ' .q2', { opacity: 0, duration: 0.25475, ease: 'power2.in' }, 4.32575);
        tl.to(sel + ' .s2', { opacity: 0, duration: 0.2038, ease: 'power2.in' }, 4.3817);

        // === Q3: 4.63145 → END (in 0.32608, HOLD ≥1.2s, NO fade out — payoff) ===
        tl.fromTo(sel + ' .q3',
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.32608, ease: 'back.out(1.4)' }, 4.63145);
        tl.fromTo(sel + ' .q3 .q-glyph',
          { scale: 1.0 },
          { scale: 1.35, duration: 0.22418, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 4.6874);
        tl.fromTo(sel + ' .s3',
          { opacity: 0, x: -8 },
          { opacity: 1, x: 0, duration: 0.28532, ease: 'power2.out' }, 4.70778);
        // Sustained glow pulse on Q3 glyph through hold (final payoff)
        tl.to(sel + ' .q3 .q-glyph',
          { scale: 1.08, duration: 0.45855, yoyo: true, repeat: 2, ease: 'sine.inOut' }, 5.1969);

        // Ambient: corner-tag subtle pulse across scene
        tl.to(sel + ' .corner-tag', { opacity: 0.6, duration: 1.3247, yoyo: true, repeat: 2, ease: 'sine.inOut' }, 1.6304);

        // Scanline drift (ambient)
        tl.to(sel + ' .scanline', { backgroundPositionY: '+=40px', duration: SLOT, ease: 'none' }, 0);

        // Anchor
        tl.to({}, { duration: SLOT }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-socrates"] = tl;
      })();
