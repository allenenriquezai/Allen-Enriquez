<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=block" rel="stylesheet"/>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    width: 940px;
    height: 560px;
  }
  body {
    position: relative;
    font-family: "Montserrat", sans-serif;
  }
  .sticker {
    position: absolute;
    top: 60px;
    left: 50px;
    width: 840px;
    box-sizing: border-box;
    padding: 38px 56px 42px;
    border-radius: 36px;
    background: #071020;
    border: 5px solid #02B3E9;
    box-shadow:
      0 0 28px rgba(2, 179, 233, 0.90),
      0 0 64px rgba(2, 179, 233, 0.55),
      0 10px 26px rgba(0, 0, 0, 0.55);
    text-align: center;
  }
  .line {
    font-weight: 900;
    font-size: 54px;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: #ffffff;
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow:
      -3px -3px 0 #000,
      3px -3px 0 #000,
      -3px 3px 0 #000,
      3px 3px 0 #000,
      0 6px 18px rgba(0, 0, 0, 0.7);
  }
</style>
</head>
<body>
  <div class="sticker">
    <div class="line">5 Things AI Agents Do</div>
    <div class="line">For Business Owners</div>
    <div class="line">&amp; Professionals</div>
  </div>
</body>
</html>
