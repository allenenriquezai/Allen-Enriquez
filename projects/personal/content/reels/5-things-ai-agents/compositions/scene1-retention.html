<template id="scene1-retention-template">
  <div
    data-composition-id="scene1-retention"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="4.16"
  >
    <div class="wrap">
      <div class="tease-badge">STAY TILL #5</div>

      <div class="metric-ring">
        <svg class="ring-svg" viewBox="0 0 360 360" width="420" height="420">
          <circle class="ring-track" cx="180" cy="180" r="160" />
          <circle class="ring-arc"   cx="180" cy="180" r="160" />
        </svg>
        <div class="ring-inner">
          <div class="metric-num"><span class="digits">10</span><span class="plus">+</span></div>
          <div class="metric-unit">HOURS</div>
          <div class="metric-sub">SAVED / WEEK</div>
        </div>
      </div>

      <div class="flash-tag">SAVED</div>

      <div class="ticks">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <style>
      [data-composition-id="scene1-retention"] { position: absolute; inset: 0; }
      [data-composition-id="scene1-retention"] .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 36px; padding: 80px 60px;
      }
      [data-composition-id="scene1-retention"] .tease-badge {
        font-family: 'Roboto Mono', monospace;
        font-weight: 700; font-size: 28px;
        letter-spacing: 0.28em;
        padding: 14px 30px;
        border-radius: 999px;
        background: rgba(2,179,233,0.12);
        border: 1px solid rgba(2,179,233,0.65);
        color: #02B3E9;
        text-shadow: 0 0 18px rgba(2,179,233,0.7);
      }
      [data-composition-id="scene1-retention"] .metric-ring {
        position: relative;
        width: 420px; height: 420px;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene1-retention"] .ring-svg {
        position: absolute; inset: 0;
        transform: rotate(-90deg);
      }
      [data-composition-id="scene1-retention"] .ring-track {
        fill: none;
        stroke: rgba(2,179,233,0.15);
        stroke-width: 14;
      }
      [data-composition-id="scene1-retention"] .ring-arc {
        fill: none;
        stroke: #02B3E9;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-dasharray: 1005;
        stroke-dashoffset: 1005;
        filter: drop-shadow(0 0 18px rgba(2,179,233,0.75));
      }
      [data-composition-id="scene1-retention"] .ring-inner {
        position: relative;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 6px;
      }
      [data-composition-id="scene1-retention"] .metric-num {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 200px;
        line-height: 1;
        color: #ffffff;
        text-shadow: 0 0 30px rgba(2,179,233,0.65);
        display: flex; align-items: baseline;
      }
      [data-composition-id="scene1-retention"] .metric-num .plus {
        font-size: 110px;
        color: #02B3E9;
        text-shadow: 0 0 24px rgba(2,179,233,0.9);
        margin-left: 4px;
      }
      [data-composition-id="scene1-retention"] .metric-unit {
        font-family: 'Roboto Mono', monospace;
        font-weight: 700; font-size: 40px;
        letter-spacing: 0.30em;
        color: #ffffff;
      }
      [data-composition-id="scene1-retention"] .metric-sub {
        font-family: 'Roboto Mono', monospace;
        font-weight: 500; font-size: 26px;
        letter-spacing: 0.22em;
        color: rgba(255,255,255,0.6);
      }
      [data-composition-id="scene1-retention"] .flash-tag {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 90px;
        color: #02B3E9;
        text-shadow:
          -3px -3px 0 #000, 3px -3px 0 #000,
          -3px 3px 0 #000, 3px 3px 0 #000,
          0 0 40px rgba(2,179,233,0.8);
        transform: rotate(-4deg);
      }
      [data-composition-id="scene1-retention"] .ticks {
        display: flex; gap: 14px;
      }
      [data-composition-id="scene1-retention"] .ticks span {
        width: 14px; height: 14px; border-radius: 50%;
        background: rgba(2,179,233,0.30);
        border: 1px solid rgba(2,179,233,0.55);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene1-retention"]';
        const tl = gsap.timeline({ paused: true });

        tl.from(sel + ' .wrap', { y: 80, opacity: 0, duration: 0.35, ease: 'power3.out' }, 0);
        tl.from(sel + ' .tease-badge', { scale: 0.7, opacity: 0, duration: 0.35, ease: 'back.out(2.2)' }, 0.10);

        tl.from(sel + ' .metric-ring', { scale: 0.85, opacity: 0, duration: 0.45, ease: 'back.out(1.8)' }, 0.25);
        tl.to(sel + ' .ring-arc', { strokeDashoffset: 150, duration: 1.3, ease: 'power2.out' }, 0.40);

        tl.from(sel + ' .metric-num', { scale: 0.7, opacity: 0, duration: 0.5, ease: 'back.out(2)' }, 0.55);
        tl.from(sel + ' .metric-num .plus', { scale: 0, opacity: 0, duration: 0.3, ease: 'back.out(3)' }, 0.95);
        tl.from(sel + ' .metric-unit', { y: 20, opacity: 0, duration: 0.3, ease: 'power2.out' }, 1.00);
        tl.from(sel + ' .metric-sub', { y: 20, opacity: 0, duration: 0.3, ease: 'power2.out' }, 1.15);

        // Flash tag "SAVED" — stamp after metric lands
        tl.fromTo(sel + ' .flash-tag',
          { scale: 2.4, opacity: 0, rotate: -14 },
          { scale: 1, opacity: 1, rotate: -4, duration: 0.25, ease: 'power3.out' }, 1.60);
        tl.to(sel + ' .flash-tag', { scale: 1.04, duration: 0.35, yoyo: true, repeat: 3, ease: 'sine.inOut' }, 1.90);

        // Ticks stagger
        tl.from(sel + ' .ticks span', { scale: 0, opacity: 0, duration: 0.2, stagger: 0.06, ease: 'back.out(2.5)' }, 1.40);
        tl.to(sel + ' .ticks span', { opacity: 0.9, duration: 0.25, yoyo: true, repeat: 6, ease: 'sine.inOut', stagger: 0.08 }, 2.20);

        // Continuous secondary motion — number pulse on beat
        tl.to(sel + ' .metric-num', { scale: 1.035, duration: 0.22, yoyo: true, repeat: 5, ease: 'sine.inOut' }, 2.00);

        // Exit
        tl.to(sel + ' .wrap', { y: -80, opacity: 0, duration: 0.28, ease: 'power2.in' }, 3.88);
        tl.to({}, { duration: 4.16 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-retention"] = tl;
      })();
    </script>
  </div>
</template>
