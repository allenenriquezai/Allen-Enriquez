    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene4-spy"]';
        const tl = gsap.timeline({ paused: true });

        // Chromatic numeral slam + split-back-to-center
        tl.from(sel + ' .num-mono', { scale: 0.3, opacity: 0, duration: 0.35, ease: 'back.out(2.5)' }, 0);
        tl.fromTo(sel + ' .num-mono .l-magenta',
          { x: -40, y: -20 },
          { x: -6, y: -3, duration: 0.45, ease: 'expo.out' }, 0);
        tl.fromTo(sel + ' .num-mono .l-blue',
          { x: 40, y: 20 },
          { x: 6, y: 3, duration: 0.45, ease: 'expo.out' }, 0);

        tl.from(sel + ' .num-label', { x: -30, opacity: 0, duration: 0.35, ease: 'power2.out' }, 0.18);

        // Dashboard pops in
        tl.from(sel + ' .dash-frame', { y: 60, opacity: 0, duration: 0.45, ease: 'power3.out' }, 0.30);

        // Spy avatar entry — slide from left with slight scale bump
        tl.fromTo(sel + ' .spy-avatar',
          { x: -300, opacity: 0, scale: 0.95 },
          { x: 0, opacity: 1, scale: 1, duration: 0.55, ease: 'back.out(1.4)' }, 0.40);

        // Column headers and rows stagger in
        tl.from(sel + ' .col-head', { y: 14, opacity: 0, duration: 0.25, stagger: 0.05, ease: 'power2.out' }, 0.55);
        tl.from(sel + ' .price-row', { x: 20, opacity: 0, duration: 0.25, stagger: 0.05, ease: 'power2.out' }, 0.70);
        tl.from(sel + ' .ad-pill',  { x: 20, opacity: 0, duration: 0.25, stagger: 0.05, ease: 'power2.out' }, 0.80);
        tl.from(sel + ' .rev-row',  { x: 20, opacity: 0, duration: 0.25, stagger: 0.05, ease: 'power2.out' }, 0.90);

        // Magnifying glass gesture prep — scale up with rotate wiggle
        tl.fromTo(sel + ' .mag-glass',
          { scale: 0.8, rotate: -8, opacity: 0 },
          { scale: 1, rotate: 0, opacity: 1, duration: 0.30, ease: 'back.out(1.6)' }, 0.85);

        // Glass starting position (above the dashboard, pre-scan hover)
        // Scan anchors relative to the stage (stage is 1000px wide, dash-frame at right: 0 width 820)
        // Dashboard columns roughly center at stage-x: 380, 560, 740
        // Glass SVG is 260px wide, so left-anchor offsets: col1 x=250, col2 x=430, col3 x=610
        const glassBaseX = 250;   // column 1 center
        const glassBaseY = 60;    // hover y offset within stage (glass top: 220 + y)

        // Glass hovers near column 1 during prep
        tl.set(sel + ' .mag-glass', { x: glassBaseX - 10, y: glassBaseY - 20 }, 0.85);

        // Column scan 1 — PRICING (glass rests over col 1: t=1.20 → 2.00)
        tl.to(sel + ' .mag-glass',
          { x: glassBaseX, y: glassBaseY, duration: 0.35, ease: 'power3.inOut' }, 1.20);
        tl.to(sel + ' .col-pricing .col-glow',
          { opacity: 1, duration: 0.30, ease: 'sine.out' }, 1.20);

        // Column scan 2 — ADS (move at t=2.00 → rest until 2.80)
        tl.to(sel + ' .mag-glass',
          { x: glassBaseX + 180, y: glassBaseY, duration: 0.35, ease: 'power3.inOut' }, 2.00);
        tl.to(sel + ' .col-pricing .col-glow',
          { opacity: 0, duration: 0.35, ease: 'sine.inOut' }, 2.00);
        tl.to(sel + ' .col-ads .col-glow',
          { opacity: 1, duration: 0.35, ease: 'sine.inOut' }, 2.00);

        // Column scan 3 — REVIEWS (move at t=2.80 → rest until 3.60)
        tl.to(sel + ' .mag-glass',
          { x: glassBaseX + 360, y: glassBaseY, duration: 0.35, ease: 'power3.inOut' }, 2.80);
        tl.to(sel + ' .col-ads .col-glow',
          { opacity: 0, duration: 0.35, ease: 'sine.inOut' }, 2.80);
        tl.to(sel + ' .col-reviews .col-glow',
          { opacity: 1, duration: 0.35, ease: 'sine.inOut' }, 2.80);

        // Avatar head-bob (subtle y wiggle during scan)
        tl.to(sel + ' .spy-avatar',
          { y: -4, duration: 0.60, yoyo: true, repeat: 3, ease: 'sine.inOut' }, 1.20);

        // Glass hand tremor — small scale wiggle while scanning
        tl.to(sel + ' .mag-glass',
          { scale: 1.02, duration: 0.30, yoyo: true, repeat: 5, ease: 'sine.inOut' }, 1.30);

        // Scanner line — two top->bottom passes (finite, no repeat -1)
