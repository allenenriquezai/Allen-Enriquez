    <script>
      (function () {
        const sel = '[data-composition-id="scene5-invoices"]';
        const tl = gsap.timeline({ paused: true });

        // Chromatic numeral slam
        tl.from(sel + ' .num-mono', { scale: 0.3, opacity: 0, duration: 0.30, ease: 'back.out(2.5)' }, 0);
        tl.fromTo(sel + ' .num-mono .l-magenta', { x: -40, y: -20 }, { x: -6, y: -3, duration: 0.38, ease: 'expo.out' }, 0);
        tl.fromTo(sel + ' .num-mono .l-blue',    { x: 40, y: 20 },  { x: 6, y: 3, duration: 0.38, ease: 'expo.out' }, 0);

        // Label slide-in
        tl.from(sel + ' .num-label', { x: -30, opacity: 0, duration: 0.30, ease: 'power2.out' }, 0.18);

        // Invoice stack container pop-in
        tl.from(sel + ' .inv-panel', { y: 40, opacity: 0, duration: 0.35, ease: 'power3.out' }, 0.30);

        // Invoice rows stagger in
        tl.from(sel + ' .inv-row', { y: 20, opacity: 0, duration: 0.25, stagger: 0.08, ease: 'power2.out' }, 0.50);

        // Overdue pulses red — scale yoyo x3 (warning flash)
        tl.to(sel + ' .pill-overdue', {
          scale: 1.03, duration: 0.12,
          yoyo: true, repeat: 5, ease: 'sine.inOut'
        }, 1.10);

        // Agent ping — pulse once
        tl.fromTo(sel + ' .agent-ping',
          { scale: 0.6, opacity: 0 },
          { scale: 1.4, opacity: 1, duration: 0.22, ease: 'power2.out' }, 1.45);
        tl.to(sel + ' .agent-ping', { scale: 1, opacity: 0, duration: 0.28, ease: 'power2.in' }, 1.67);

        // Flip cascade — red out / green in, staggered starts
        const flipStarts = [1.55, 1.70, 1.85, 2.00];
        const rows = ['.r1', '.r2', '.r3', '.r4'];
        rows.forEach((r, i) => {
          const t = flipStarts[i];
          tl.to(sel + ' ' + r + ' .pill-overdue', {
            opacity: 0, duration: 0.20, ease: 'power2.out'
          }, t);
          tl.to(sel + ' ' + r + ' .pill-paid', {
            opacity: 1, duration: 0.20, ease: 'power2.out'
          }, t);
          // Continuous secondary motion — glow pulse (scale) on green pill after it lands
          tl.to(sel + ' ' + r + ' .pill-paid', {
            scale: 1.05, duration: 0.18, yoyo: true, repeat: 1, ease: 'sine.inOut'
          }, t + 0.20);
        });

        // Payoff stamp pop
        tl.fromTo(sel + ' .payoff-stamp',
          { scale: 2.0, opacity: 0, rotate: -10 },
          { scale: 1, opacity: 1, rotate: -3, duration: 0.25, ease: 'power3.out' }, 2.10);
        tl.to(sel + ' .payoff-stamp', { scale: 1.05, duration: 0.2, yoyo: true, repeat: 2, ease: 'sine.inOut' }, 2.35);

        // Exit
        tl.to(sel + ' .wrap', { y: -60, opacity: 0, duration: 0.25, ease: 'power2.in' }, 2.67);

        tl.to({}, { duration: 2.92 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene5-invoices"] = tl;
      })();
