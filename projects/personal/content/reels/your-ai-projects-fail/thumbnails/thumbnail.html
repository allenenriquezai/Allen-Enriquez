<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Thumbnail</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Roboto+Mono:wght@400;500;700&display=block" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        overflow: hidden;
        background: #05080F;
        font-family: 'Montserrat', sans-serif;
        color: #fff;
      }
      .bg {
        position: absolute; inset: 0;
        background-image: url('face-source.png');
        background-size: cover;
        background-position: center center;
      }
      .vignette { display: none; }
      .face-glow { display: none; }

      /* Top headline block */
      .top {
        position: absolute;
        top: 140px; left: 0; right: 0;
        display: flex; flex-direction: column; align-items: center;
        text-align: center;
      }
      .kicker {
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 34px;
        color: #02B3E9;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        padding: 10px 22px;
        border: 1.5px solid rgba(2,179,233,0.55);
        border-radius: 999px;
        background: rgba(2,179,233,0.10);
        box-shadow: 0 0 24px rgba(2,179,233,0.35);
        margin-bottom: 28px;
      }
      .headline {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 168px;
        line-height: 0.92;
        letter-spacing: -0.01em;
        text-transform: uppercase;
        color: #ffffff;
        text-shadow:
          -5px -5px 0 #000,
          5px -5px 0 #000,
          -5px 5px 0 #000,
          5px 5px 0 #000,
          0 0 30px rgba(0,0,0,0.85),
          0 8px 20px rgba(0,0,0,0.75);
      }
      .headline .red {
        color: #ff4757;
        text-shadow:
          -5px -5px 0 #000,
          5px -5px 0 #000,
          -5px 5px 0 #000,
          5px 5px 0 #000,
          0 0 40px rgba(255,71,87,0.75);
      }

      /* Bottom callout */
      .bottom {
        position: absolute;
        bottom: 140px; left: 0; right: 0;
        display: flex; flex-direction: column; align-items: center;
        text-align: center;
      }
      .bottom-accent {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 96px;
        line-height: 0.95;
        letter-spacing: -0.005em;
        text-transform: uppercase;
        color: #02B3E9;
        text-shadow:
          -4px -4px 0 #000,
          4px -4px 0 #000,
          -4px 4px 0 #000,
          4px 4px 0 #000,
          0 0 34px rgba(2,179,233,0.7);
      }
      .bottom-sub {
        margin-top: 16px;
        font-family: 'Roboto Mono', monospace;
        font-weight: 500;
        font-size: 36px;
        color: rgba(255,255,255,0.85);
        letter-spacing: 0.08em;
      }

      /* Brand mark */
      .brand {
        position: absolute;
        bottom: 34px; left: 50%; transform: translateX(-50%);
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 26px;
        letter-spacing: 0.34em;
        color: rgba(255,255,255,0.55);
        text-transform: uppercase;
      }

      /* Scanline overlay */
      .scanline {
        position: absolute; inset: 0;
        background: repeating-linear-gradient(0deg,
          transparent 0, transparent 3px,
          rgba(2,179,233,0.025) 3px, rgba(2,179,233,0.025) 4px);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="face-glow"></div>
    <div class="vignette"></div>

    <div class="top">
      <div class="kicker">AI PROJECTS</div>
      <div class="headline">YOUR AI<br><span class="red">FAILS</span></div>
    </div>

    <div class="bottom">
      <div class="bottom-accent">FIX INSIDE →</div>
      <div class="bottom-sub">IT'S NOT THE TOOL</div>
    </div>

    <div class="brand">@ALLENENRIQUEZ.AI</div>
    <div class="scanline"></div>
  </body>
</html>
