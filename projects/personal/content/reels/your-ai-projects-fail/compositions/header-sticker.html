<template id="header-sticker-template">
  <div data-composition-id="header-sticker"
       data-start="0"
       data-width="1080"
       data-height="1920"
       data-duration="5.47">
    <style>
      [data-composition-id="header-sticker"] {
        position: absolute;
        inset: 0;
        pointer-events: none;
        font-family: 'Montserrat', sans-serif;
      }
      [data-composition-id="header-sticker"] .hstick {
        position: absolute;
        top: 160px;
        left: 50%;
        transform: translateX(-50%);
        padding: 26px 40px 28px;
        border: 4px solid #02B3E9;
        border-radius: 22px;
        background: rgba(5, 8, 15, 0.82);
        box-shadow:
          0 0 36px rgba(2,179,233,0.55),
          0 0 14px rgba(2,179,233,0.35) inset;
        text-align: center;
        line-height: 1.0;
      }
      [data-composition-id="header-sticker"] .hstick .l1,
      [data-composition-id="header-sticker"] .hstick .l2 {
        display: block;
        font-weight: 900;
        font-size: 84px;
        letter-spacing: 0.01em;
        color: #ffffff;
        text-transform: uppercase;
        text-shadow: 0 0 18px rgba(2,179,233,0.55);
        white-space: nowrap;
      }
      [data-composition-id="header-sticker"] .hstick .l2 {
        margin-top: 8px;
      }
      [data-composition-id="header-sticker"] .hstick .l2 .fail {
        color: #ff4757;
        text-shadow: 0 0 22px rgba(255,71,87,0.6);
      }
    </style>

    <div class="hstick" id="hstick-root">
      <span class="l1">YOUR AI</span>
      <span class="l2">PROJECTS <span class="fail">FAIL</span></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function(){
        const SEL = '[data-composition-id="header-sticker"]';
        function start(){
          const root = document.querySelector(SEL);
          if (!root) { setTimeout(start, 40); return; }
          if (typeof gsap === 'undefined') { setTimeout(start, 40); return; }
          if (root.dataset.built === '1') return;
          root.dataset.built = '1';

          const SLOT = parseFloat(root.getAttribute('data-duration')) || 5.47;
          const tl = gsap.timeline({ paused: true });
          const stick = root.querySelector('#hstick-root');

          tl.fromTo(stick,
            { y: -120, opacity: 0, scale: 0.88 },
            { y: 0, opacity: 1, scale: 1, duration: 0.38, ease: 'back.out(2.2)' },
            0.05);
          tl.to(stick, { scale: 1.02, duration: 0.5, yoyo: true, repeat: Math.max(1, Math.floor((SLOT - 1) / 1.0)), ease: 'sine.inOut' },
            0.5);
          tl.to(stick, { y: -10, opacity: 0, scale: 0.96, duration: 0.25, ease: 'power2.in' }, SLOT - 0.28);

          tl.to({}, { duration: SLOT }, 0);
          window.__timelines = window.__timelines || {};
          window.__timelines['header-sticker'] = tl;
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start);
        } else {
          start();
        }
      })();
    </script>
  </div>
</template>
