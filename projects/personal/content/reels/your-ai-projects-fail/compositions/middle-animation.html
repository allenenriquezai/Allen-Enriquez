          });


          const beats = [
            { id: 'b1',  t0: 0.14,  t1: 1.66 },
            { id: 'b2',  t0: 1.66,  t1: 4.25 },
            { id: 'b3',  t0: 4.25,  t1: 5.39 },
            { id: 'b4',  t0: 5.39,  t1: 6.64 },
            { id: 'b5',  t0: 6.64,  t1: 8.45 },
            { id: 'b6',  t0: 8.45,  t1: 10.88 },
            { id: 'b7',  t0: 10.88, t1: 12.96, payoff: true },
            { id: 'b8',  t0: 12.96, t1: 15.40, payoff: true },
            { id: 'b9',  t0: 15.40, t1: 17.11 },
            { id: 'b10', t0: 17.11, t1: 19.16 },
            { id: 'b11', t0: 19.16, t1: 21.02 },
            { id: 'b12', t0: 21.02, t1: 23.40, payoff: true },
            { id: 'b13', t0: 23.40, t1: 25.05 },
            { id: 'b14', t0: 25.05, t1: 27.00 },
            { id: 'b15', t0: 27.00, t1: 28.16 },
            { id: 'b16', t0: 28.16, t1: 29.82 },
            { id: 'b17', t0: 29.82, t1: 31.28, payoff: true },
            { id: 'b18', t0: 31.28, t1: 32.90 },
            { id: 'b19', t0: 32.90, t1: SLOT }
          ];

          // Corner tag pulses gently whole composition
          tl.to('#m-corner', { opacity: 0.9, duration: 0.5, ease: 'power2.out' }, 0.2);
          tl.to('#m-corner', { opacity: 0.55, duration: 1.0, yoyo: true, repeat: Math.floor(SLOT / 2.0), ease: 'sine.inOut' }, 0.8);

          // Generic card in/out + per-beat specials
          beats.forEach((b, i) => {
            const card = '#' + b.id;
            const dur = b.t1 - b.t0;

            // Card enter
            tl.fromTo(card,
              { opacity: 0, y: 40, scale: 0.94 },
              { opacity: 1, y: 0, scale: 1, duration: 0.28, ease: 'back.out(1.8)' },
              b.t0);

            // Default inner elements (kicker, headline) staggered
            tl.from(card + ' .kicker',
              { opacity: 0, y: -14, duration: 0.22, ease: 'power2.out' },
              b.t0 + 0.05);
            tl.from(card + ' .headline',
              { opacity: 0, scale: 0.85, duration: 0.32, ease: 'back.out(2.1)' },
              b.t0 + 0.14);

            // Icon draw-on (for beats with data-icon)
            const ic = iconMap[b.id];
            if (ic && ic.info.length){
              const drawEls = ic.info.filter(x => x.type === 'draw').map(x => x.el);
              const fadeEls = ic.info.filter(x => x.type === 'fade').map(x => x.el);
              const drawDur = Math.min(0.9, Math.max(0.5, dur * 0.45));
              if (drawEls.length){
                tl.to(drawEls, {
                  strokeDashoffset: 0,
                  duration: drawDur,
                  ease: 'power2.inOut',
                  stagger: drawDur / Math.max(drawEls.length, 1) * 0.6
                }, b.t0 + 0.08);
              }
              if (fadeEls.length){
                tl.to(fadeEls, { opacity: 1, duration: 0.3, ease: 'power2.out' }, b.t0 + drawDur * 0.5);
              }
              tl.fromTo(ic.wrap, { scale: 0.88 }, { scale: 1, duration: 0.35, ease: 'back.out(2.0)' }, b.t0 + 0.08);
              if (b.payoff){
                tl.to(ic.wrap, { scale: 1.05, duration: 0.4, yoyo: true, repeat: 1, ease: 'sine.inOut' },
                  b.t0 + drawDur + 0.2);
              }
            }

            // Payoff hold pulse
            if (b.payoff){
              tl.to(card, { scale: 1.04, duration: 0.45, ease: 'sine.inOut', yoyo: true, repeat: 1 },
                b.t0 + 0.55);
            } else {
              // Non-payoff: subtle drift so frames aren't static
              tl.to(card + ' .headline', { y: '+=10', duration: Math.max(0.5, dur - 0.6), yoyo: true, repeat: 1, ease: 'sine.inOut' },
                b.t0 + 0.5);
            }

            // Card exit
            if (i < beats.length - 1){
              tl.to(card,
                { opacity: 0, y: -26, scale: 1.02, duration: 0.22, ease: 'power2.in' },
                b.t1 - 0.18);
            }
          });

          // ----- Per-beat specials -----

          // Beat 2: 3 pills pop on accurate word hits
          const pillHits = [1.66, 2.70, 3.57]; // ChatGPT / Zapier / Make (middle-local starts from transcript)
          ['#b2p1','#b2p2','#b2p3'].forEach((sel, i) => {
            tl.set(sel, { opacity: 0, scale: 0.6 }, 1.66);
            tl.to(sel, { opacity: 1, scale: 1, duration: 0.28, ease: 'back.out(2.4)' }, pillHits[i]);
            tl.to(sel, { scale: 1.06, duration: 0.2, yoyo: true, repeat: 1, ease: 'sine.inOut' }, pillHits[i] + 0.28);
          });

          // Beat 4/5/9: strike-through sweep after word lands
          ['#b4-strike','#b5-strike','#b9-strike'].forEach((sel, i) => {
            const beatStart = [5.39, 6.64, 15.40][i];
            tl.fromTo(sel + '::after', { scaleX: 0 }, { scaleX: 1, duration: 0.35, ease: 'power3.out' }, beatStart + 0.55);
            // Can't animate ::after directly via GSAP (pseudo-elements). Use CSS var trick instead:
          });
          // Proper strike — animate a real element inside the span
          // Use CSS approach: at beat start + delay, add `.slashed` class which triggers scaleX(1).
          // Simpler: animate via a real overlay we add in JS
          function addSlash(selId, atTime){
            const span = root.querySelector(selId);
            if (!span) return;
            const overlay = document.createElement('span');
            overlay.style.cssText = 'position:absolute;left:-6%;right:-6%;top:52%;height:12px;background:#ff4757;box-shadow:0 0 18px rgba(255,71,87,0.8);transform-origin:left center;transform:scaleX(0);pointer-events:none;';
            span.style.position = 'relative';
            span.appendChild(overlay);
            tl.to(overlay, { scaleX: 1, duration: 0.4, ease: 'power3.out' }, atTime);
          }
          addSlash('#b4-strike', 5.39 + 0.55);
          addSlash('#b5-strike', 6.64 + 0.7);
          addSlash('#b9-strike', 15.40 + 0.55);

          // Beat 6: chaos words jitter in
          const b6chaos = Array.from(root.querySelectorAll('#b6-chaos span'));
          b6chaos.forEach((el, i) => {
            tl.fromTo(el,
              { opacity: 0, scale: 0.6, x: (i % 2 ? -30 : 30) },
              { opacity: 1, scale: 1, x: 0, duration: 0.35, ease: 'back.out(2.2)' },
              8.45 + 0.4 + i * 0.15);
            tl.to(el, { y: '+=10', duration: 0.6, yoyo: true, repeat: 2, ease: 'sine.inOut' },
              8.45 + 0.8 + i * 0.15);
          });

          // Beat 7: HAMMER slam with extra oomph
          tl.fromTo('#b7-big',
            { scale: 0.4, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.38, ease: 'back.out(2.8)' },
            10.88 + 0.6);
          tl.to('#b7-big', { scale: 1.08, duration: 0.25, yoyo: true, repeat: 1, ease: 'sine.inOut' },
            10.88 + 1.0);

          // Beat 8: BLUEPRINT slam
          tl.fromTo('#b8-big',
            { scale: 0.4, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.38, ease: 'back.out(2.8)' },
            12.96 + 0.65);
          tl.to('#b8-big', { scale: 1.06, duration: 0.3, yoyo: true, repeat: 1, ease: 'sine.inOut' },
            12.96 + 1.05);

          // Beat 10: flow nodes + arrows pop sequentially
          ['#b10n1','#b10a1','#b10n2','#b10a2','#b10n3'].forEach((sel, i) => {
            tl.fromTo(sel, { opacity: 0, scale: 0.6 },
              { opacity: 1, scale: 1, duration: 0.25, ease: 'back.out(2.2)' },
              17.11 + 0.6 + i * 0.18);
          });

          // Beat 11: bot chip slides in + glow
          tl.fromTo('#b11-bot',
            { opacity: 0, x: -60 },
            { opacity: 1, x: 0, duration: 0.45, ease: 'power3.out' },
            19.16 + 0.5);
          tl.to('#b11-bot', { boxShadow: '0 0 40px rgba(2,179,233,0.8)', duration: 0.4, yoyo: true, repeat: 2, ease: 'sine.inOut' },
            19.16 + 1.0);

          // Beat 12: WORKS stamp slam (payoff)
          tl.fromTo('#b12-stamp',
            { scale: 0, opacity: 0, rotate: -30 },
            { scale: 1, opacity: 1, rotate: -6, duration: 0.4, ease: 'back.out(2.5)' },
            21.02 + 0.7);
          tl.to('#b12-stamp', { scale: 1.08, duration: 0.3, yoyo: true, repeat: 1, ease: 'sine.inOut' },
            21.02 + 1.1);

          // Beat 15: step numbers pop on each word ("step", "by", "step")
          ['#b15s1','#b15s2','#b15s3'].forEach((sel, i) => {
            tl.fromTo(sel,
              { opacity: 0, scale: 0.4 },
              { opacity: 1, scale: 1, duration: 0.3, ease: 'back.out(2.6)' },
              27.00 + 0.3 + i * 0.36);
          });

          // Beat 19: chaos words frantic jitter
          const b19chaos = Array.from(root.querySelectorAll('#b19-chaos span'));
          b19chaos.forEach((el, i) => {
            tl.fromTo(el,
              { opacity: 0, scale: 0.5 },
              { opacity: 1, scale: 1, duration: 0.25, ease: 'back.out(2.4)' },
              32.90 + 0.3 + i * 0.1);
            tl.to(el, { x: '+=12', y: '+=8', duration: 0.3, yoyo: true, repeat: 3, ease: 'sine.inOut' },
              32.90 + 0.6 + i * 0.1);
          });

          // Ambient scanline drift
          tl.to(SEL + ' .scanline', { backgroundPositionY: '+=50px', duration: SLOT, ease: 'none' }, 0);

          // Hard fade-out for entire stage in last 0.3s — prevents bleed into CTA talking head
          tl.to(root.querySelector('.stage'),
            { opacity: 0, duration: 0.25, ease: 'power2.in' },
            SLOT - 0.30);

          // Anchor — Motion Law 11
          tl.to({}, { duration: SLOT }, 0);

          window.__timelines = window.__timelines || {};
          window.__timelines['middle-animation'] = tl;
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', start);
        } else {
          start();
        }
      })();
    </script>
  </div>
</template>
