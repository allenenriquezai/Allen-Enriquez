<template id="scene2-new-template">

    data-duration="2.60"

      <div class="label">AI AGENTS</div>
      <div class="title">DOES THE WORK<br/>FOR YOU</div>
      <div class="checks">
        <span class="check c1">✓ Drafts</span>
        <span class="check c2">✓ Sends</span>
        <span class="check c3">✓ Updates</span>
      </div>
    </div>

    <style>
      [data-composition-id="scene2-new"] { position: absolute; inset: 0; }
      [data-composition-id="scene2-new"] .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 44px;
      }
      [data-composition-id="scene2-new"] .label {
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 48px;
        letter-spacing: 0.28em;
        color: #02B3E9;
        text-transform: uppercase;
        text-shadow: 0 0 24px rgba(2,179,233,0.6);
      }
      [data-composition-id="scene2-new"] .title {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 110px;
        line-height: 0.95;
        text-align: center;
        color: #ffffff;
        background: linear-gradient(180deg, #ffffff 0%, #a8d9ec 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 40px rgba(2,179,233,0.35));
      }
      [data-composition-id="scene2-new"] .checks {
        display: flex; gap: 28px;
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 36px;
      }
      [data-composition-id="scene2-new"] .check {
        padding: 18px 28px;

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = '[data-composition-id="scene2-new"]';
        // Entry from bottom — scale + fade (fast-mode props only)
        tl.from(sel + ' .wrap', { y: 150, scale: 0.92, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0);
        tl.from(sel + ' .label', { scale: 0.8, duration: 0.45, ease: 'back.out(2)' }, 0.1);
        tl.from(sel + ' .title', { y: 30, opacity: 0, duration: 0.5, ease: 'power3.out' }, 0.25);
        tl.from(sel + ' .check', { y: 30, opacity: 0, scale: 0.9, duration: 0.3, ease: 'back.out(2)', stagger: 0.1 }, 0.7);
        // Exit
        tl.to(sel + ' .wrap', { y: -150, scale: 0.92, opacity: 0, duration: 0.33, ease: 'power2.in' }, 2.27);
        tl.to({}, { duration: 2.60 }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-new"] = tl;
      })();
    </script>
