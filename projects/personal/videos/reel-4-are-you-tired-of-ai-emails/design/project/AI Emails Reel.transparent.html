<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Render — AI Emails Reel (Transparent)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: transparent !important; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }
  #root { position: absolute; inset: 0; width: 1080px; height: 1920px; background: transparent; }
  @keyframes aeblink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="animations.jsx"></script>

<!-- Override Stage AFTER animations.jsx defines it, BEFORE scenes.jsx / App -->
<script type="text/babel">
  // Controllable time state
  window.__controlledTime = 0;
  window.__timeListeners = [];
  window.__setTime = function(t) {
    window.__controlledTime = t;
    window.__timeListeners.forEach(fn => fn(t));
  };

  // Replacement Stage: no rAF loop, no playback bar. Reads from window.__controlledTime.
  // Background is FORCED TRANSPARENT regardless of prop.
  function RenderStage({ width = 1080, height = 1920, duration = 42, background = 'transparent', children }) {
    const [time, setTime] = React.useState(window.__controlledTime || 0);
    React.useEffect(() => {
      const listener = (t) => setTime(t);
      window.__timeListeners.push(listener);
      return () => {
        const i = window.__timeListeners.indexOf(listener);
        if (i >= 0) window.__timeListeners.splice(i, 1);
      };
    }, []);
    const ctxValue = React.useMemo(
      () => ({ time, duration, playing: false, setTime: () => {}, setPlaying: () => {} }),
      [time, duration]
    );
    return (
      <div style={{
        position: 'absolute',
        left: 0, top: 0,
        width, height,
        background: 'transparent',
        overflow: 'hidden',
      }}>
        <window.TimelineContext.Provider value={ctxValue}>
          {children}
        </window.TimelineContext.Provider>
      </div>
    );
  }

  window.Stage = RenderStage;
  Object.assign(window, { Stage: RenderStage });
</script>

<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel">

const TWEAKS = {
  "accent": "#4EB3F2",
  "showTransitions": true,
  "showProgressBar": false
}

const DURATION = 42;

// Null-out chrome overlays so the App can reference them without rendering anything.
function ProgressBar() { return null; }
function Watermark() { return null; }
function Hook() { return null; }
// Also null out BackgroundGrid by overriding the window binding that scenes.jsx defines.
const __OriginalBackgroundGrid = window.BackgroundGrid;
window.BackgroundGrid = function BackgroundGrid() { return null; };

function App() {
  return (
    <Stage
      width={1080}
      height={1920}
      duration={DURATION}
      background={'transparent'}
      persistKey="ae-reel"
    >
      {/* BackgroundGrid removed for transparent render */}

      {/* ProgressBar removed for transparent render */}

      <Sprite start={0} end={3}>
        <Step1_OpenSent />
      </Sprite>

      <Sprite start={3} end={9}>
        <Step2_CopyEmails />
      </Sprite>

      <Sprite start={9} end={14}>
        <Step3_Paste />
      </Sprite>

      <Sprite start={14} end={27}>
        <Step4_Prompt />
      </Sprite>

      <Sprite start={27} end={32}>
        <Step5_SaveProject />
      </Sprite>

      <Sprite start={32} end={36.5}>
        <Step6_PasteInstructions />
      </Sprite>

      <Sprite start={36.5} end={42}>
        <FinaleEmail />
      </Sprite>

      {TWEAKS.showTransitions && (
        <>
          <Sprite start={2.7} end={3.5}>
            <StepTransition step="02" title="Copy your 10 emails." />
          </Sprite>
          <Sprite start={8.7} end={9.5}>
            <StepTransition step="03" title="Paste them into AI." />
          </Sprite>
          <Sprite start={13.7} end={14.5}>
            <StepTransition step="04" title="Write this prompt." />
          </Sprite>
          <Sprite start={26.7} end={27.5}>
            <StepTransition step="05" title="Save as a project." />
          </Sprite>
          <Sprite start={31.7} end={32.5}>
            <StepTransition step="06" title="Paste the instructions." />
          </Sprite>
          <Sprite start={36.2} end={37.0}>
            <StepTransition step="✓" title="Every email sounds like you." />
          </Sprite>
        </>
      )}

      {/* Watermark removed for transparent render */}
      {/* Hook removed for transparent render */}
    </Stage>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// Signal ready after a frame so React has done initial paint
requestAnimationFrame(() => requestAnimationFrame(() => { window.__ready = true; }));
</script>
</body>
</html>
