<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Render — AI Emails Reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #05080f; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }
  #root { position: absolute; inset: 0; width: 1080px; height: 1920px; }
  @keyframes aeblink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="animations.jsx"></script>

<!-- Override Stage AFTER animations.jsx defines it, BEFORE scenes.jsx / App -->
<script type="text/babel">
  // Controllable time state
  window.__controlledTime = 0;
  window.__timeListeners = [];
  window.__setTime = function(t) {
    window.__controlledTime = t;
    window.__timeListeners.forEach(fn => fn(t));
  };

  // Replacement Stage: no rAF loop, no playback bar. Reads from window.__controlledTime.
  function RenderStage({ width = 1080, height = 1920, duration = 42, background = '#05080f', children }) {
    const [time, setTime] = React.useState(window.__controlledTime || 0);
    React.useEffect(() => {
      const listener = (t) => setTime(t);
      window.__timeListeners.push(listener);
      return () => {
        const i = window.__timeListeners.indexOf(listener);
        if (i >= 0) window.__timeListeners.splice(i, 1);
      };
    }, []);
    const ctxValue = React.useMemo(
      () => ({ time, duration, playing: false, setTime: () => {}, setPlaying: () => {} }),
      [time, duration]
    );
    return (
      <div style={{
        position: 'absolute',
        left: 0, top: 0,
        width, height,
        background,
        overflow: 'hidden',
      }}>
        <window.TimelineContext.Provider value={ctxValue}>
          {children}
        </window.TimelineContext.Provider>
      </div>
    );
  }

  window.Stage = RenderStage;
  // Also reassign via Object.assign to overwrite the one set by animations.jsx
  Object.assign(window, { Stage: RenderStage });
</script>

<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel">

const TWEAKS = {
  "accent": "#4EB3F2",
  "showTransitions": true,
  "showProgressBar": true
}

const DURATION = 42;

function ProgressBar() {
  if (!TWEAKS.showProgressBar) return null;
  const { time } = useTimeline();
  const pct = (time / DURATION) * 100;
  return (
    <div style={{
      position: 'absolute',
      top: 28, left: 48, right: 48,
      height: 6, borderRadius: 3,
      background: 'rgba(255,255,255,0.08)',
      overflow: 'hidden',
      zIndex: 100,
    }}>
      <div style={{
        width: `${pct}%`, height: '100%',
        background: BRAND.accent,
        boxShadow: `0 0 12px ${BRAND.glow}`,
        transition: 'none',
      }}/>
    </div>
  );
}

function Watermark() {
  return (
    <div style={{
      position: 'absolute',
      bottom: 28, right: 48,
      display: 'flex', alignItems: 'center', gap: 10,
      zIndex: 100,
      opacity: 0.8,
    }}>
      <div style={{
        fontFamily: MONO, fontSize: 18, fontWeight: 700,
        color: BRAND.accent, fontStyle: 'italic',
        letterSpacing: '-0.02em',
        textShadow: `0 0 12px ${BRAND.glow}`,
      }}>AE</div>
      <div style={{
        fontFamily: MONO, fontSize: 12, color: BRAND.grey,
        letterSpacing: '0.15em',
      }}>@ALLEN.ENRIQUEZ</div>
    </div>
  );
}

function Hook() {
  const { time } = useTimeline();
  const remaining = Math.max(0, DURATION - time);
  const totalFake = 5 * 60;
  const displayed = Math.floor(totalFake - (time / DURATION) * (60 + 30));
  const m = Math.floor(displayed / 60);
  const s = displayed % 60;
  return (
    <div style={{
      position: 'absolute',
      bottom: 28, left: 48,
      display: 'flex', alignItems: 'center', gap: 12,
      zIndex: 100,
    }}>
      <div style={{
        width: 12, height: 12, borderRadius: '50%',
        background: BRAND.orange,
        boxShadow: `0 0 14px ${BRAND.orange}`,
        animation: 'aeblink 1s steps(2) infinite',
      }}/>
      <div style={{
        fontFamily: MONO, fontSize: 16, fontWeight: 500,
        color: BRAND.offwhite,
        letterSpacing: '0.12em',
      }}>UNDER 5 MIN · {String(m)}:{String(s).padStart(2,'0')}</div>
    </div>
  );
}

function App() {
  return (
    <Stage
      width={1080}
      height={1920}
      duration={DURATION}
      background={BRAND.bg}
      persistKey="ae-reel"
    >
      <BackgroundGrid />

      <ProgressBar />

      <Sprite start={0} end={3}>
        <Step1_OpenSent />
      </Sprite>

      <Sprite start={3} end={9}>
        <Step2_CopyEmails />
      </Sprite>

      <Sprite start={9} end={14}>
        <Step3_Paste />
      </Sprite>

      <Sprite start={14} end={27}>
        <Step4_Prompt />
      </Sprite>

      <Sprite start={27} end={32}>
        <Step5_SaveProject />
      </Sprite>

      <Sprite start={32} end={36.5}>
        <Step6_PasteInstructions />
      </Sprite>

      <Sprite start={36.5} end={42}>
        <FinaleEmail />
      </Sprite>

      {TWEAKS.showTransitions && (
        <>
          <Sprite start={3.0} end={3.8}>
            <StepTransition step="02" title="Copy your last 10 emails." />
          </Sprite>
          <Sprite start={9.0} end={9.8}>
            <StepTransition step="03" title="Paste them into ChatGPT." />
          </Sprite>
          <Sprite start={14.0} end={14.8}>
            <StepTransition step="04" title="Write this prompt." />
          </Sprite>
          <Sprite start={27.0} end={27.8}>
            <StepTransition step="05" title="Save it as a project." />
          </Sprite>
          <Sprite start={32.0} end={32.8}>
            <StepTransition step="06" title="Paste into project instructions." />
          </Sprite>
          <Sprite start={35.8} end={36.6}>
            <StepTransition step="✓" title="Now every email sounds like you." />
          </Sprite>
        </>
      )}

      <Watermark />
      <Hook />
    </Stage>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// Signal ready after a frame so React has done initial paint
requestAnimationFrame(() => requestAnimationFrame(() => { window.__ready = true; }));
</script>
</body>
</html>
