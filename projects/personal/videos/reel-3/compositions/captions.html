        const DIM = "rgba(255,255,255,0.85)";
        const ACTIVE = "#02B3E9";
        const SPOKEN = "#ffffff";
        const ACTIVE_SCALE = 1.16;

        const stage = document.querySelector('[data-composition-id="captions"] #cap-stage');
        if (!stage) return;

        SEGMENTS.forEach(function (seg, segIdx) {
          const wrap = document.createElement("div");
          wrap.className = "cap-line-wrap";
          wrap.id = "cap-seg-" + segIdx;

          const line = document.createElement("div");
          line.className = "cap-line";

          seg.words.forEach(function (w, wIdx) {
            const span = document.createElement("span");
            span.className = "cap-word";
            span.id = "cap-w-" + segIdx + "-" + wIdx;
            // Base (rest) white text as textContent
            span.appendChild(document.createTextNode(w.word));
            // Overlaid active (brand blue) layer, opacity 0 by default
            const active = document.createElement("span");
            active.className = "w-active";
            active.id = "cap-wa-" + segIdx + "-" + wIdx;
            active.textContent = w.word;
            span.appendChild(active);
            line.appendChild(span);
            if (wIdx < seg.words.length - 1) {
              line.appendChild(document.createTextNode(" "));
            }
          });

          wrap.appendChild(line);
          stage.appendChild(wrap);
        });

        const tl = gsap.timeline({ paused: true });
        const FADE_IN = 0.05;
        const FADE_OUT = 0.05;

        SEGMENTS.forEach(function (seg, segIdx) {
          const wrapSel = '[data-composition-id="captions"] #cap-seg-' + segIdx;
          const segStart = seg.words[0].start;
          const segEnd = seg.words[seg.words.length - 1].end;

          const nextSeg = SEGMENTS[segIdx + 1];
          const hardEnd = nextSeg ? nextSeg.words[0].start : Math.min(segEnd + 0.3, COMP_DURATION);
          const fadeInAt = Math.max(segStart - 0.02, 0);
          const fadeOutAt = Math.max(hardEnd - FADE_OUT - 0.02, fadeInAt + 0.1);
          const hideAt = hardEnd - 0.01;

          // Reset all words' active layer + scale before segment enters
          seg.words.forEach(function (w, wIdx) {
            const wordSel = '[data-composition-id="captions"] #cap-w-' + segIdx + "-" + wIdx;
            const activeSel = '[data-composition-id="captions"] #cap-wa-' + segIdx + "-" + wIdx;
            tl.set(wordSel, { scale: 1.0 }, fadeInAt);
            tl.set(activeSel, { opacity: 0 }, fadeInAt);
          });

          tl.set(wrapSel, { visibility: "visible" }, fadeInAt);
          tl.fromTo(
            wrapSel,
            { opacity: 0, y: 10 },
            { opacity: 1, y: 0, duration: FADE_IN, ease: "power2.out" },
            fadeInAt
          );

          // Karaoke via layered opacity (fast-mode safe, no color tween)
          seg.words.forEach(function (w, wIdx) {
            const wordSel = '[data-composition-id="captions"] #cap-w-' + segIdx + "-" + wIdx;
            const activeSel = '[data-composition-id="captions"] #cap-wa-' + segIdx + "-" + wIdx;
            // Pop active layer + scale parent on word start
            tl.to(activeSel, { opacity: 1, duration: 0.08, ease: 'power2.out' }, w.start);
            tl.to(wordSel, { scale: ACTIVE_SCALE, duration: 0.08, ease: 'back.out(3)' }, w.start);
            // Fade active layer + scale back on word end
            tl.to(activeSel, { opacity: 0, duration: 0.12, ease: 'power2.out' }, w.end);
            tl.to(wordSel, { scale: 1.0, duration: 0.12, ease: 'power2.out' }, w.end);
          });

          tl.to(
            wrapSel,
            { opacity: 0, duration: FADE_OUT, ease: "power2.in" },
            fadeOutAt
          );
          tl.set(wrapSel, { visibility: "hidden" }, hideAt);
        });

        tl.set({}, {}, COMP_DURATION);

        window.__timelines = window.__timelines || {};
        window.__timelines["captions"] = tl;
      })();
