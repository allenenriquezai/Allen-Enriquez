<template id="scene7-payoff-template">
  <div
    data-composition-id="scene7-payoff"
    data-start="0"
    data-width="1080"
    data-height="1920"
    data-duration="5.46"
  >
    <div class="wrap">
      <div class="heading">BY HAND <span class="vs">vs</span> AGENT</div>

      <div class="panels">
        <!-- LEFT: BY HAND / slow -->
        <div class="panel panel-left">
          <div class="pill pill-red">BY HAND</div>
          <div class="clock-wrap">
            <svg class="clock" viewBox="0 0 320 320" width="320" height="320">
              <circle cx="160" cy="160" r="150" fill="none" stroke="rgba(255,71,87,0.55)" stroke-width="6"/>
              <circle cx="160" cy="160" r="138" fill="none" stroke="rgba(255,71,87,0.22)" stroke-width="2"/>
              <!-- 12 tick marks -->
              <g stroke="rgba(255,255,255,0.55)" stroke-width="4" stroke-linecap="round">
                <line x1="160" y1="22"  x2="160" y2="40"/>
                <line x1="229" y1="40"  x2="220" y2="56"/>
                <line x1="280" y1="91"  x2="264" y2="100"/>
                <line x1="298" y1="160" x2="280" y2="160"/>
                <line x1="280" y1="229" x2="264" y2="220"/>
                <line x1="229" y1="280" x2="220" y2="264"/>
                <line x1="160" y1="298" x2="160" y2="280"/>
                <line x1="91"  y1="280" x2="100" y2="264"/>
                <line x1="40"  y1="229" x2="56"  y2="220"/>
                <line x1="22"  y1="160" x2="40"  y2="160"/>
                <line x1="40"  y1="91"  x2="56"  y2="100"/>
                <line x1="91"  y1="40"  x2="100" y2="56"/>
              </g>
              <!-- hour hand (short) -->
              <line class="hour-hand"
                x1="160" y1="160" x2="160" y2="95"
                stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
              <!-- minute hand (long) -->
              <line class="minute-hand"
                x1="160" y1="160" x2="160" y2="50"
                stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
              <!-- center pin -->
              <circle cx="160" cy="160" r="8" fill="#ff4757"/>
            </svg>
          </div>
          <div class="big-num big-num-min">30 MIN</div>
          <div class="way-tag way-old">OLD WAY</div>
        </div>

        <!-- RIGHT: AGENT / fast -->
        <div class="panel panel-right">
          <div class="panel-glow"></div>
          <div class="pill pill-blue">AGENT</div>
          <div class="stopwatch">
            <span class="digi-part digi-00">00</span><span class="digi-colon">:</span><span class="digi-stack">
              <span class="digi-layer digi-30">30</span>
              <span class="digi-layer digi-00b">00</span>
            </span>
          </div>
          <div class="big-num big-num-sec">30 SEC</div>
          <div class="way-tag way-new">NEW WAY</div>
        </div>
      </div>

      <div class="slam-wrap">
        <div class="slam">
          <span class="slam-layer slam-base">60× FASTER</span>
          <span class="slam-layer slam-magenta">60× FASTER</span>
          <span class="slam-layer slam-blue">60× FASTER</span>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene7-payoff"] { position: absolute; inset: 0; }
      [data-composition-id="scene7-payoff"] .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 36px; padding: 60px 40px;
      }

      [data-composition-id="scene7-payoff"] .heading {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 54px;
        letter-spacing: 0.06em;
        color: #ffffff;
        text-shadow: 0 0 28px rgba(2,179,233,0.75);
      }
      [data-composition-id="scene7-payoff"] .heading .vs {
        color: rgba(255,255,255,0.55);
        font-weight: 700;
        font-style: italic;
        padding: 0 8px;
      }

      [data-composition-id="scene7-payoff"] .panels {
        display: flex;
        gap: 40px;
        align-items: stretch;
      }

      [data-composition-id="scene7-payoff"] .panel {
        position: relative;
        width: 460px;
        height: 680px;
        border-radius: 24px;
        padding: 28px 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        overflow: hidden;
      }
      [data-composition-id="scene7-payoff"] .panel-left {
        background: rgba(80, 80, 80, 0.10);
        border: 1px solid rgba(255, 71, 87, 0.45);
      }
      [data-composition-id="scene7-payoff"] .panel-right {
        background: rgba(2,179,233,0.10);
        border: 2px solid #02B3E9;
      }
      [data-composition-id="scene7-payoff"] .panel-glow {
        position: absolute;
        inset: -4px;
        border-radius: 28px;
        pointer-events: none;
        box-shadow:
          0 0 60px rgba(2,179,233,0.75),
          inset 0 0 40px rgba(2,179,233,0.35);
        opacity: 0;
      }

      [data-composition-id="scene7-payoff"] .pill {
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 0.18em;
        padding: 10px 22px;
        border-radius: 999px;
      }
      [data-composition-id="scene7-payoff"] .pill-red {
        color: #ff4757;
        background: rgba(255, 71, 87, 0.12);
        border: 1px solid rgba(255, 71, 87, 0.55);
        text-shadow: 0 0 12px rgba(255,71,87,0.5);
      }
      [data-composition-id="scene7-payoff"] .pill-blue {
        color: #02B3E9;
        background: rgba(2,179,233,0.14);
        border: 1px solid rgba(2,179,233,0.65);
        text-shadow: 0 0 14px rgba(2,179,233,0.8);
      }

      [data-composition-id="scene7-payoff"] .clock-wrap {
        width: 320px; height: 320px;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene7-payoff"] .clock {
        display: block;
        filter: drop-shadow(0 0 16px rgba(255,71,87,0.25));
      }
      [data-composition-id="scene7-payoff"] .hour-hand {
        transform-origin: 160px 160px;
        transform-box: fill-box;
      }
      [data-composition-id="scene7-payoff"] .minute-hand {
        transform-origin: 160px 160px;
        transform-box: fill-box;
      }

      [data-composition-id="scene7-payoff"] .stopwatch {
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 160px;
        line-height: 1;
        color: #02B3E9;
        letter-spacing: -0.02em;
        text-shadow:
          0 0 24px rgba(2,179,233,0.85),
          0 0 48px rgba(2,179,233,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="scene7-payoff"] .digi-stack {
        position: relative;
        display: inline-block;
        width: 1.35ch;
        text-align: center;
      }
      [data-composition-id="scene7-payoff"] .digi-layer {
        position: absolute;
        left: 0; right: 0; top: 0;
        text-align: center;
      }
      [data-composition-id="scene7-payoff"] .digi-30 { opacity: 1; }
      [data-composition-id="scene7-payoff"] .digi-00b { opacity: 0; }
      [data-composition-id="scene7-payoff"] .digi-stack::before {
        content: '30';
        visibility: hidden;
      }

      [data-composition-id="scene7-payoff"] .big-num {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="scene7-payoff"] .big-num-min {
        font-size: 88px;
        color: rgba(255,255,255,0.7);
      }
      [data-composition-id="scene7-payoff"] .big-num-sec {
        font-size: 110px;
        color: #02B3E9;
        text-shadow:
          0 0 26px rgba(2,179,233,0.85),
          0 0 60px rgba(2,179,233,0.55);
      }

      [data-composition-id="scene7-payoff"] .way-tag {
        font-family: 'Roboto Mono', monospace;
        font-weight: 500;
        font-size: 20px;
        letter-spacing: 0.22em;
      }
      [data-composition-id="scene7-payoff"] .way-old { color: rgba(255,71,87,0.85); }
      [data-composition-id="scene7-payoff"] .way-new { color: rgba(2,179,233,0.95); }

      [data-composition-id="scene7-payoff"] .slam-wrap {
        position: relative;
        margin-top: 18px;
      }
      [data-composition-id="scene7-payoff"] .slam {
        position: relative;
        width: 980px;
        height: 160px;
      }
      [data-composition-id="scene7-payoff"] .slam-layer {
        position: absolute; inset: 0;
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 130px;
        line-height: 1;
        letter-spacing: -0.03em;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="scene7-payoff"] .slam-base    { color: #ffffff; text-shadow: 0 0 32px rgba(2,179,233,0.6); }
      [data-composition-id="scene7-payoff"] .slam-magenta { color: #ff00a8; mix-blend-mode: screen; opacity: 0.85; }
      [data-composition-id="scene7-payoff"] .slam-blue    { color: #02B3E9; mix-blend-mode: screen; opacity: 0.9; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sel = '[data-composition-id="scene7-payoff"]';
        const tl = gsap.timeline({ paused: true });

        // Heading pop-in
        tl.fromTo(sel + ' .heading',
          { scale: 0.85, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(2)' }, 0);

        // Panels slide in
        tl.fromTo(sel + ' .panel-left',
          { x: -100, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.45, ease: 'power3.out' }, 0.25);
        tl.fromTo(sel + ' .panel-right',
          { x: 100, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.45, ease: 'power3.out' }, 0.30);

        // LEFT — clock reveal + slow rotation
        tl.fromTo(sel + ' .clock-wrap',
          { scale: 0.7, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.40, ease: 'back.out(1.8)' }, 0.55);
        tl.fromTo(sel + ' .minute-hand',
          { rotate: 0 },
          { rotate: 360, duration: 3.0, ease: 'none' }, 0.80);
        tl.fromTo(sel + ' .hour-hand',
          { rotate: 0 },
          { rotate: 30, duration: 3.0, ease: 'none' }, 0.80);
        tl.fromTo(sel + ' .big-num-min',
          { opacity: 0 },
          { opacity: 1, duration: 0.35, ease: 'power2.out' }, 1.00);

        // RIGHT — digital readout fade in
        tl.fromTo(sel + ' .stopwatch',
          { opacity: 0 },
          { opacity: 1, duration: 0.35, ease: 'power2.out' }, 0.60);

        // Stopwatch countdown: cross-fade 30 -> 00 at t=1.50
        // Keep it simple + fast-mode safe: two absolutely-stacked layers, opacity swap
        tl.to(sel + ' .digi-30',  { opacity: 0, duration: 0.15, ease: 'power2.in' }, 1.45);
        tl.to(sel + ' .digi-00b', { opacity: 1, duration: 0.15, ease: 'power2.out' }, 1.45);

        // 30 SEC slam in
        tl.fromTo(sel + ' .big-num-sec',
          { scale: 2.2, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.25, ease: 'back.out(2.5)' }, 1.60);

        // Glow pulse on right panel
        tl.to(sel + ' .panel-glow',
          { opacity: 1, duration: 0.25, yoyo: true, repeat: 5, ease: 'sine.inOut' }, 1.60);

        // 60x FASTER slam
        tl.fromTo(sel + ' .slam',
          { scale: 3.0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.40, ease: 'expo.out' }, 2.40);
        tl.fromTo(sel + ' .slam-magenta',
          { x: -40, y: -15 },
          { x: -6, y: -3, duration: 0.55, ease: 'expo.out' }, 2.40);
        tl.fromTo(sel + ' .slam-blue',
          { x: 40, y: 15 },
          { x: 6, y: 3, duration: 0.55, ease: 'expo.out' }, 2.40);

        // Rumble on slam — scale yoyo
        tl.to(sel + ' .slam', { scale: 1.02, duration: 0.15, yoyo: true, repeat: 3, ease: 'sine.inOut' }, 2.85);

        // Final seconds — right panel pulse + left fade
        tl.to(sel + ' .big-num-sec', { scale: 1.03, duration: 0.28, yoyo: true, repeat: 5, ease: 'sine.inOut' }, 3.30);
        tl.to(sel + ' .big-num-min', { opacity: 0.5, duration: 0.6, ease: 'power2.out' }, 3.30);
        tl.to(sel + ' .panel-left',  { opacity: 0.78, duration: 0.6, ease: 'power2.out' }, 3.30);

        // Exit
        tl.to(sel + ' .wrap', { y: -90, opacity: 0, duration: 0.35, ease: 'power2.in' }, 5.08);

        // Final padding
        tl.to({}, { duration: 5.46 }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene7-payoff"] = tl;
      })();
    </script>
  </div>
</template>
