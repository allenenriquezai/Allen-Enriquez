<template id="slide-folder-map-template">
  <div data-composition-id="slide-folder-map"
       data-start="0"
       data-width="1080"
       data-height="1080"
       data-duration="8">
    <style>
      [data-composition-id="slide-folder-map"] {
        position: absolute;
        inset: 0;
        background: #0D0D0D;
        color: #fff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }

      [data-composition-id="slide-folder-map"] .bg-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      [data-composition-id="slide-folder-map"] .glow-top {
        position: absolute;
        top: -120px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 300px;
        background: radial-gradient(ellipse, rgba(59,130,246,0.18) 0%, transparent 70%);
        pointer-events: none;
      }

      [data-composition-id="slide-folder-map"] .wrap {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: 72px 80px 60px;
      }

      [data-composition-id="slide-folder-map"] .header {
        margin-bottom: 12px;
        opacity: 0;
      }

      [data-composition-id="slide-folder-map"] .title {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 52px;
        line-height: 1.1;
        color: #fff;
        letter-spacing: -1px;
      }

      [data-composition-id="slide-folder-map"] .subtitle {
        font-family: "Roboto Mono", monospace;
        font-size: 20px;
        color: rgba(255,255,255,0.45);
        margin-top: 10px;
        letter-spacing: 0.01em;
      }

      [data-composition-id="slide-folder-map"] .divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, rgba(59,130,246,0.6) 0%, transparent 100%);
        margin: 28px 0 32px;
        opacity: 0;
      }

      [data-composition-id="slide-folder-map"] .folder-tree {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      [data-composition-id="slide-folder-map"] .row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 13px 0;
        opacity: 0;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }

      [data-composition-id="slide-folder-map"] .row.sub {
        padding-left: 48px;
      }

      [data-composition-id="slide-folder-map"] .row-icon {
        font-size: 22px;
        width: 32px;
        text-align: center;
        flex-shrink: 0;
      }

      [data-composition-id="slide-folder-map"] .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        margin: 0 10px 0 -4px;
      }

      [data-composition-id="slide-folder-map"] .dot-blue  { background: #3B82F6; box-shadow: 0 0 8px rgba(59,130,246,0.7); }
      [data-composition-id="slide-folder-map"] .dot-green { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.7); }
      [data-composition-id="slide-folder-map"] .dot-check { color: #22c55e; font-size: 16px; margin: 0 6px 0 -4px; flex-shrink: 0; }
      [data-composition-id="slide-folder-map"] .dot-yellow { background: #F59E0B; box-shadow: 0 0 8px rgba(245,158,11,0.7); }
      [data-composition-id="slide-folder-map"] .dot-grey  { background: rgba(255,255,255,0.2); }

      [data-composition-id="slide-folder-map"] .row-name {
        font-family: "Roboto Mono", monospace;
        font-size: 19px;
        font-weight: 500;
        color: #fff;
        min-width: 260px;
        flex-shrink: 0;
      }

      [data-composition-id="slide-folder-map"] .row-name.parent {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
      }

      [data-composition-id="slide-folder-map"] .row-desc {
        font-family: "Roboto Mono", monospace;
        font-size: 16px;
        color: rgba(255,255,255,0.4);
        flex: 1;
      }

      [data-composition-id="slide-folder-map"] .row-desc .badge {
        display: inline-block;
        background: rgba(245,158,11,0.15);
        border: 1px solid rgba(245,158,11,0.4);
        color: #F59E0B;
        font-size: 13px;
        padding: 1px 8px;
        border-radius: 4px;
        margin-left: 8px;
        vertical-align: middle;
      }

      [data-composition-id="slide-folder-map"] .footer {
        margin-top: 24px;
        opacity: 0;
      }

      [data-composition-id="slide-folder-map"] .footer-line {
        height: 1px;
        background: rgba(255,255,255,0.08);
        margin-bottom: 16px;
      }

      [data-composition-id="slide-folder-map"] .footer-note {
        font-family: "Roboto Mono", monospace;
        font-size: 15px;
        color: rgba(59,130,246,0.7);
        display: flex;
        align-items: center;
        gap: 10px;
      }
    </style>

    <div class="bg-grid"></div>
    <div class="glow-top"></div>

    <div class="wrap">
      <!-- Header -->
      <div class="header" id="sfm-header">
        <div class="title">Your Gmail, organized.</div>
        <div class="subtitle">Here's how your inbox works now.</div>
      </div>

      <div class="divider" id="sfm-divider"></div>

      <!-- Folder tree -->
      <div class="folder-tree">

        <!-- 1. Projects -->
        <div class="row" id="sfm-r0">
          <div class="row-icon">📁</div>
          <div class="row-name parent">1. Projects</div>
          <div class="row-desc">All project email threads</div>
        </div>

        <div class="row sub" id="sfm-r1">
          <div class="row-icon"></div>
          <div class="dot dot-blue"></div>
          <div class="row-name">A. Upcoming</div>
          <div class="row-desc">New project emails land here automatically</div>
        </div>

        <div class="row sub" id="sfm-r2">
          <div class="row-icon"></div>
          <div class="dot dot-green"></div>
          <div class="row-name">B. Ongoing</div>
          <div class="row-desc">Your active jobs — you promote here</div>
        </div>

        <div class="row sub" id="sfm-r3">
          <div class="row-icon"></div>
          <div class="dot-check">✓</div>
          <div class="row-name">C. Completed</div>
          <div class="row-desc">Done jobs — you archive here</div>
        </div>

        <div class="row sub" id="sfm-r4">
          <div class="row-icon"></div>
          <div class="dot dot-yellow"></div>
          <div class="row-name">D. Unknown</div>
          <div class="row-desc">Old projects — needs your review<span class="badge">93 projects</span></div>
        </div>

        <!-- Other folders -->
        <div class="row" id="sfm-r5">
          <div class="row-icon">👥</div>
          <div class="row-name parent">2. Team</div>
          <div class="row-desc">Daily accomplishments — Kharene + Kim</div>
        </div>

        <div class="row" id="sfm-r6">
          <div class="row-icon">📋</div>
          <div class="row-name parent">3. Bids / Invites</div>
          <div class="row-desc">Auto-removed from inbox</div>
        </div>

        <div class="row" id="sfm-r7">
          <div class="row-icon">🏷</div>
          <div class="row-name parent">4. Vendors</div>
          <div class="row-desc">Pricing emails, out of inbox</div>
        </div>

        <div class="row" id="sfm-r8">
          <div class="row-icon">🗂</div>
          <div class="row-name parent">5. Archive</div>
          <div class="row-desc">Promos + low-signal emails</div>
        </div>

        <div class="row" id="sfm-r9">
          <div class="row-icon">🏢</div>
          <div class="row-name parent">6. Office</div>
          <div class="row-desc">Admin + Joseph emails</div>
        </div>

      </div>

      <!-- Footer -->
      <div class="footer" id="sfm-footer">
        <div class="footer-line"></div>
        <div class="footer-note">
          <span>⚡</span>
          <span>New emails sorted automatically. You only touch D. Unknown once.</span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      (function(){
        const SLOT_DURATION = 8;
        const tl = gsap.timeline({ paused: true });

        // Header fade in
        tl.to("#sfm-header", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.15)
          .from("#sfm-header", { y: 20 }, 0.15);

        // Divider wipe
        tl.to("#sfm-divider", { opacity: 1, scaleX: 1, duration: 0.6, ease: "power2.out" }, 0.55)
          .from("#sfm-divider", { scaleX: 0, transformOrigin: "left center" }, 0.55);

        // Folder rows — staggered 0.12s each
        const rows = ["#sfm-r0","#sfm-r1","#sfm-r2","#sfm-r3","#sfm-r4","#sfm-r5","#sfm-r6","#sfm-r7","#sfm-r8","#sfm-r9"];
        rows.forEach((id, i) => {
          const t = 0.85 + i * 0.14;
          tl.to(id, { opacity: 1, duration: 0.35, ease: "power2.out" }, t)
            .from(id, { y: 12 }, t);
        });

        // Footer
        tl.to("#sfm-footer", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0.85 + rows.length * 0.14 + 0.1);

        tl.to({}, { duration: SLOT_DURATION }, 0); // anchor — Motion Law 11

        window.__timelines = window.__timelines || {};
        window.__timelines["slide-folder-map"] = tl;
      })();
    </script>
  </div>
</template>
