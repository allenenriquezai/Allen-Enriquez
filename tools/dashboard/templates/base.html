<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enriquez OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Enriquez OS">
    <link rel="apple-touch-icon" href="/static/icon-192.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    {% block content %}{% endblock %}
    <script>
        // Auth — inject token into all fetch calls
        const _origFetch = window.fetch;
        window.fetch = function(url, opts = {}) {
            const token = localStorage.getItem('enriquez_os_token');
            if (token) {
                opts.headers = opts.headers || {};
                if (opts.headers instanceof Headers) {
                    opts.headers.set('X-Token', token);
                } else {
                    opts.headers['X-Token'] = token;
                }
            }
            return _origFetch(url, opts).then(res => {
                if (res.status === 401) {
                    localStorage.removeItem('enriquez_os_token');
                    window.location.href = '/login';
                }
                return res;
            });
        };
        // Redirect to login if no token
        if (!localStorage.getItem('enriquez_os_token')) {
            window.location.href = '/login';
        }
    </script>
    <script src="/static/app.js"></script>
    <script src="/static/spend.js"></script>
    <script src="/static/command.js"></script>
    <script src="/static/brief.js"></script>
    <script src="/static/chat.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
