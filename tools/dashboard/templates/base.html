<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enriquez OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // AE brand — extend Tailwind with palette + font families
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ae: {
                blue:      '#02B3E9',
                'blue-dim':'#0a1e2e',
                dark:      '#0A1628',
                surface:   '#13334A',
                teal:      '#1A4D5C',
                border:    '#25373C',
                muted:     '#96A0A5',
                warn:      '#FF9B28',
              },
            },
            fontFamily: {
              mono: ['"Roboto Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
              sans: ['Montserrat', 'Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Roboto+Mono:wght@400;500;600;700&display=swap">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Enriquez OS">
    <link rel="apple-touch-icon" href="/static/icon-192.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    {% block content %}{% endblock %}
    <script>
        // Auth — inject token into all fetch calls
        const _origFetch = window.fetch;
        window.fetch = function(url, opts = {}) {
            const token = localStorage.getItem('enriquez_os_token');
            if (token) {
                opts.headers = opts.headers || {};
                if (opts.headers instanceof Headers) {
                    opts.headers.set('X-Token', token);
                } else {
                    opts.headers['X-Token'] = token;
                }
            }
            return _origFetch(url, opts).then(res => {
                if (res.status === 401) {
                    localStorage.removeItem('enriquez_os_token');
                    window.location.href = '/login';
                }
                return res;
            });
        };
        // Redirect to login if no token
        if (!localStorage.getItem('enriquez_os_token')) {
            window.location.href = '/login';
        }
    </script>
    <script src="/static/app.js?v=12"></script>
    <script src="/static/spend.js?v=12"></script>
    <script src="/static/command.js?v=12"></script>
    <script src="/static/brief.js?v=12"></script>
    <script src="/static/ops.js?v=12"></script>
    <script src="/static/library.js?v=12"></script>
    <script src="/static/today.js?v=12"></script>
    <script src="/static/systems.js?v=12"></script>
    <script src="/static/files.js?v=12"></script>
    <script src="/static/chat.js?v=12"></script>
    <script src="/static/outreach_hub.js?v=12"></script>
    <script src="/static/outcomes.js?v=12"></script>
    <script src="/static/content_bank.js?v=12"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
</body>
</html>
