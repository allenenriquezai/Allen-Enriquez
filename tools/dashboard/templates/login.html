<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enriquez OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-6">
        <h1 class="text-2xl font-bold text-center mb-8">Enriquez OS</h1>
        <div id="login-form" class="space-y-4">
            <input id="token-input" type="password" placeholder="Enter access token"
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"
                   onkeydown="if(event.key==='Enter')login()">
            <button onclick="login()"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-sm font-medium transition">
                Enter
            </button>
            <div id="login-error" class="text-red-400 text-sm text-center hidden">Invalid token</div>
        </div>
    </div>
    <script>
        // Check if already authed
        const token = localStorage.getItem('enriquez_os_token');
        if (token) {
            window.location.href = '/';
        }

        async function login() {
            const input = document.getElementById('token-input');
            const t = input.value.trim();
            if (!t) return;

            const res = await fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: t }),
            });
            const data = await res.json();
            if (data.ok) {
                localStorage.setItem('enriquez_os_token', t);
                window.location.href = '/';
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                input.value = '';
                input.focus();
            }
        }
    </script>
</body>
</html>
